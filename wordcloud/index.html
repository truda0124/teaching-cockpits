<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>互動文字雲</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      font-family: 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #word-count {
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.85rem;
      color: #ccc;
    }
    #toggle-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 8px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    #toggle-btn:hover { background: rgba(255,255,255,0.25); }

    /* ── Cloud area ── */
    #cloud-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #cloud-canvas {
      transition: opacity 0.4s ease;
    }
    #cloud-canvas.hidden { opacity: 0; pointer-events: none; }
    #empty-msg {
      position: absolute;
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 1.1rem;
      pointer-events: none;
    }

    /* ── Input ── */
    #input-bar {
      padding: 16px 24px 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      z-index: 10;
    }
    #word-input {
      flex: 1;
      max-width: 480px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #word-input::placeholder { color: rgba(255,255,255,0.45); }
    #word-input:focus { border-color: #f9d423; }
    #submit-btn {
      padding: 12px 28px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    #submit-btn:hover { opacity: 0.9; }
    #submit-btn:active { transform: scale(0.96); }

    /* ── QR Code panel ── */
    #qr-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      backdrop-filter: blur(10px);
      z-index: 20;
    }
    #qr-panel-inner img, #qr-panel-inner canvas { border-radius: 8px; display: block; }
    #qr-url {
      margin-top: 6px;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.5);
      max-width: 120px;
      word-break: break-all;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 10px 24px;
      border-radius: 999px;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      z-index: 99;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>✨ 互動文字雲</h1>
  <span id="word-count">0 個詞彙</span>
  <button id="toggle-btn">隱藏文字雲 👁</button>
</header>

<div id="cloud-wrap">
  <canvas id="cloud-canvas"></canvas>
  <p id="empty-msg">還沒有詞彙，快來輸入第一個吧！</p>
</div>

<div id="input-bar">
  <input id="word-input" type="text" placeholder="輸入詞彙，按 Enter 或點送出..." maxlength="30" autocomplete="off" />
  <button id="submit-btn">送出</button>
</div>

<div id="qr-panel">
  <div id="qr-panel-inner"></div>
  <p id="qr-url"></p>
</div>

<div id="toast"></div>

<script>
  // ── Config ──────────────────────────────────────────────
  const SUPABASE_URL  = 'https://ehczkmmgdogtnhhjunbr.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoY3prbW1nZG9ndG5oaGp1bmJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzM4MDMsImV4cCI6MjA5NjQ0OTgwM30.3VDqFwh_RHCU275cINSFEdXAsrs4DAqcnatvxcHnxb0';
  const TABLE = 'word_entries';

  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── State ────────────────────────────────────────────────
  let words = {};   // { text: count }
  let cloudVisible = true;
  let renderTimer = null;

  // ── Elements ─────────────────────────────────────────────
  const canvas     = document.getElementById('cloud-canvas');
  const countEl    = document.getElementById('word-count');
  const toggleBtn  = document.getElementById('toggle-btn');
  const input      = document.getElementById('word-input');
  const submitBtn  = document.getElementById('submit-btn');
  const emptyMsg   = document.getElementById('empty-msg');
  const toast      = document.getElementById('toast');

  // ── QR Code ──────────────────────────────────────────────
  const pageURL = window.location.href;
  try {
    new QRCode(document.getElementById('qr-panel-inner'), {
      text: pageURL,
      width: 120, height: 120,
      colorDark: '#1a1040', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) { console.warn('QR init failed', e); }
  document.getElementById('qr-url').textContent = pageURL.replace('https://', '');

  // ── Canvas sizing ─────────────────────────────────────────
  function resizeCanvas() {
    const wrap = document.getElementById('cloud-wrap');
    canvas.width  = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); scheduleRender(); });

  // ── Word cloud colors ─────────────────────────────────────
  const COLORS = ['#f9d423','#ff4e50','#fc913a','#f9d423','#a8ff78',
                  '#78ffd6','#7bc7ff','#c77dff','#ff9de2','#ffe29f'];
  function randomColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }

  const wordColorMap = {};
  function getColor(word) {
    if (!wordColorMap[word]) wordColorMap[word] = randomColor();
    return wordColorMap[word];
  }

  // ── Render ────────────────────────────────────────────────
  function scheduleRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(renderCloud, 200);
  }

  function renderCloud() {
    const entries = Object.entries(words);
    const total = entries.reduce((s,[,c]) => s + c, 0);

    countEl.textContent = `${total} 個詞彙`;
    emptyMsg.style.display = entries.length === 0 ? 'block' : 'none';

    if (entries.length === 0) return;

    const maxCount = Math.max(...entries.map(([,c]) => c));
    const list = entries.map(([w, c]) => [w, Math.round(14 + (c / maxCount) * 60)]);

    WordCloud(canvas, {
      list,
      gridSize: 8,
      weightFactor: 1,
      fontFamily: 'Microsoft JhengHei, PingFang TC, Arial',
      color: (word) => getColor(word),
      rotateRatio: 0.3,
      rotationSteps: 2,
      backgroundColor: 'transparent',
      drawOutOfBound: false,
      shrinkToFit: true,
    });
  }

  // ── Toggle ────────────────────────────────────────────────
  toggleBtn.addEventListener('click', () => {
    cloudVisible = !cloudVisible;
    canvas.classList.toggle('hidden', !cloudVisible);
    toggleBtn.textContent = cloudVisible ? '隱藏文字雲 👁' : '顯示文字雲 👁';
  });

  // ── Submit ────────────────────────────────────────────────
  async function addWord() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    const { error } = await db.from(TABLE).insert({ text });
    if (error) {
      showToast('❌ 送出失敗：' + error.message);
      return;
    }
    showToast('✅ 已加入：' + text);
  }

  submitBtn.addEventListener('click', addWord);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

  // ── Load existing ─────────────────────────────────────────
  async function loadWords() {
    const { data, error } = await db.from(TABLE).select('text');
    if (error) { console.error(error); return; }
    words = {};
    data.forEach(({ text }) => { words[text] = (words[text] || 0) + 1; });
    scheduleRender();
  }

  // ── Realtime ──────────────────────────────────────────────
  db.channel('word-changes')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: TABLE },
      ({ new: row }) => {
        words[row.text] = (words[row.text] || 0) + 1;
        scheduleRender();
      })
    .subscribe();

  // ── Toast ─────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ── Init ──────────────────────────────────────────────────
  loadWords();
</script>
</body>
</html>
