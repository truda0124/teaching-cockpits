<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點2：基督宗教在臺灣 — 填充題</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{color:var(--Y);font-size:1.4rem;text-align:center;margin:16px 0 4px;}
.subtitle{color:var(--faint);font-size:.85rem;margin-bottom:20px;}
.card{background:var(--board);border-radius:12px;padding:24px;max-width:640px;width:100%;margin-bottom:16px;}
.question{font-size:1.1rem;line-height:1.8;margin-bottom:16px;}
.blank-input{background:var(--dim);border:2px solid #2d5030;border-radius:6px;padding:8px 12px;color:var(--chalk);font-size:1rem;width:100%;margin:8px 0;}
.blank-input:focus{outline:none;border-color:var(--B);}
button.check{background:var(--G);color:#0e1e10;border:none;border-radius:8px;padding:10px 28px;cursor:pointer;font-size:1rem;font-weight:bold;margin-top:10px;}
button.check:hover{opacity:.85;}
.feedback{margin-top:14px;padding:12px;border-radius:8px;font-size:.95rem;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#1a4020;color:var(--G);}
.feedback.no{background:#3a1a1a;color:var(--R);}
.progress{color:var(--faint);font-size:.85rem;text-align:center;margin-bottom:8px;}
.score-bar{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
.score-box{background:var(--dim);border-radius:8px;padding:8px 20px;font-size:1rem;}
.score-box span{color:var(--G);font-weight:bold;}
button.next{background:var(--B);color:#fff;border:none;border-radius:8px;padding:10px 28px;cursor:pointer;font-size:1rem;margin-top:12px;display:none;}
.result-card{background:var(--board);border-radius:12px;padding:32px;max-width:640px;width:100%;text-align:center;display:none;}
.result-card h2{color:var(--Y);font-size:1.5rem;margin-bottom:12px;}
button.replay{background:var(--Y);color:#162b18;border:none;border-radius:8px;padding:10px 28px;cursor:pointer;font-size:1rem;font-weight:bold;}
.qr-area{margin-top:20px;}
.qr-area p{color:var(--faint);font-size:.8rem;margin-bottom:6px;}
</style>
</head>
<body>
<h1>✝️ 重點2：基督宗教在臺灣</h1>
<p class="subtitle">5年級社會 第4單元第3課 ｜ 填充題</p>
<div class="score-bar">
  <div class="score-box">得分：<span id="score">0</span></div>
  <div class="score-box">題數：<span id="total">0</span>/5</div>
</div>
<div class="progress" id="progress">第 1 題，共 5 題</div>
<div class="card" id="quiz-card">
  <div class="question" id="q-text"></div>
  <input class="blank-input" id="user-ans" type="text" placeholder="請在此輸入答案…" autocomplete="off">
  <br>
  <button class="check" onclick="checkAns()">確認答案</button>
  <div class="feedback" id="feedback"></div>
  <button class="next" id="btn-next" onclick="nextQ()">下一題 →</button>
</div>
<div class="result-card" id="result-card">
  <h2>🎉 完成！</h2>
  <p id="result-msg"></p>
  <br>
  <button class="replay" onclick="restart()">🔄 再玩一次</button>
  <div class="qr-area">
    <p>掃描 QR Code 分享此遊戲</p>
    <img id="qr-img" src="" alt="QR Code" width="120" height="120">
  </div>
</div>

<script>
const QS=[
  {q:"基督宗教信仰的對象是？（填入神明名稱）",ans:["上帝"],exp:"基督宗教信仰上帝，奉行的經典為聖經。"},
  {q:"基督宗教奉行的主要經典叫做？",ans:["聖經"],exp:"聖經是基督宗教的主要經典，分《舊約》與《新約》兩部分。"},
  {q:"大航海時代，哪兩個國家的人將基督宗教傳入臺灣？（任填一個即可）",ans:["荷蘭","西班牙"],exp:"大航海時代，荷蘭與西班牙人將基督宗教傳入臺灣，並向平埔族群傳教。"},
  {q:"清帝國開港通商後，傳教士再度來臺，並建立了哪三種機構？（任填一個即可）",ans:["教堂","教會醫院","學校"],exp:"傳教士建立教堂、教會醫院與學校，對臺灣社會影響至今。"},
  {q:"基督教徒與天主教徒定期聚會祈禱聽道的活動，稱為？",ans:["禮拜","做禮拜"],exp:"做禮拜與禱告是基督宗教重要的宗教儀式，通常每週一次。"},
];
let cur=0,score=0;
function normalize(s){return s.trim().replace(/\s/g,'');}
function render(){
  const q=QS[cur];
  document.getElementById('progress').textContent=`第 ${cur+1} 題，共 ${QS.length} 題`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('user-ans').value='';
  document.getElementById('user-ans').disabled=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('user-ans').focus();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')checkAns();});
function checkAns(){
  const q=QS[cur];
  const ua=normalize(document.getElementById('user-ans').value);
  const correct=q.ans.some(a=>normalize(a)===ua||ua.includes(normalize(a)));
  document.getElementById('total').textContent=cur+1;
  document.getElementById('user-ans').disabled=true;
  const fb=document.getElementById('feedback');
  if(correct){fb.className='feedback show ok';fb.textContent='✅ 正確！'+q.exp;score++;document.getElementById('score').textContent=score;}
  else{fb.className='feedback show no';fb.textContent='❌ 答錯了！正確答案：'+q.ans.join('或')+'。'+q.exp;}
  document.getElementById('btn-next').style.display='inline-block';
}
function nextQ(){cur++;if(cur>=QS.length)showResult();else render();}
function showResult(){
  document.getElementById('quiz-card').style.display='none';
  document.getElementById('progress').style.display='none';
  const rc=document.getElementById('result-card');rc.style.display='block';
  const pct=Math.round(score/QS.length*100);
  document.getElementById('result-msg').textContent=`你答對了 ${score} / ${QS.length} 題（${pct}%）${pct>=80?'🌟 優秀！':pct>=60?'👍 不錯！':'💪 再試試看！'}`;
  document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=120x120&data='+encodeURIComponent(window.location.href);
}
function restart(){
  cur=0;score=0;
  document.getElementById('score').textContent=0;document.getElementById('total').textContent=0;
  document.getElementById('quiz-card').style.display='block';
  document.getElementById('progress').style.display='block';
  document.getElementById('result-card').style.display='none';
  render();
}
render();
</script>
</body>
</html>
