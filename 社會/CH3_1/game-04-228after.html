<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點4：二二八事件的後續處理</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{color:var(--Y);font-size:1.4rem;text-align:center;margin-bottom:4px;}
.subtitle{color:var(--faint);font-size:.85rem;margin-bottom:20px;text-align:center;}
.progress{width:100%;max-width:560px;background:var(--dim);border-radius:8px;height:8px;margin-bottom:16px;}
.progress-bar{height:8px;border-radius:8px;background:var(--G);transition:width .4s;}
.card{background:var(--board);border-radius:12px;padding:24px;max-width:560px;width:100%;}
.qnum{color:var(--faint);font-size:.8rem;margin-bottom:8px;}
.question{font-size:1.1rem;line-height:1.6;margin-bottom:8px;}
.blank-line{display:inline-block;border-bottom:2px solid var(--Y);min-width:80px;text-align:center;color:var(--Y);font-weight:700;}
.options{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 16px;}
.opt{background:var(--dim);border:2px solid var(--faint);border-radius:6px;padding:8px 14px;cursor:pointer;font-size:.9rem;transition:all .2s;}
.opt:hover{border-color:var(--B);}
.opt.used{opacity:.4;cursor:default;}
.opt.correct-src{border-color:var(--G);}
.feedback{padding:12px;border-radius:8px;font-size:.9rem;display:none;margin-bottom:8px;}
.feedback.show{display:block;}
.feedback.ok{background:#1a3d1a;color:var(--G);}
.feedback.no{background:#3d1a1a;color:var(--R);}
.btn{margin-top:12px;padding:10px 28px;background:var(--Y);color:#162b18;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;display:none;}
.btn.show{display:inline-block;}
.score-box{text-align:center;padding:24px;display:none;}
.score-box.show{display:block;}
.score-num{font-size:3rem;color:var(--Y);font-weight:700;}
.qr-area{margin-top:24px;text-align:center;}
.qr-area img{border:4px solid var(--board);border-radius:8px;}
.qr-area p{color:var(--faint);font-size:.75rem;margin-top:6px;}
.tag{display:inline-block;background:var(--dim);color:var(--B);border-radius:4px;padding:2px 8px;font-size:.75rem;margin-bottom:10px;}
</style>
</head>
<body>
<h1>🕊️ 重點4：二二八事件的後續處理</h1>
<p class="subtitle">國小社會5下・第三單元第1課 形成性評量</p>
<div class="progress"><div class="progress-bar" id="pbar" style="width:0%"></div></div>
<div class="card" id="card">
  <div class="tag">填充題 Fill</div>
  <div class="qnum" id="qnum">第 1 題／共 4 題</div>
  <div class="question" id="question"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <button class="btn" id="nextBtn" onclick="next()">下一題 →</button>
</div>
<div class="score-box" id="scorebox">
  <div style="font-size:1.2rem;margin-bottom:8px;">🎉 完成！你的得分</div>
  <div class="score-num" id="scorenum"></div>
  <div style="color:var(--faint);margin-bottom:16px;">分（滿分 100 分）</div>
  <button onclick="restart()" style="padding:10px 28px;background:var(--Y);color:#162b18;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;">🔄 重新挑戰</button>
</div>
<div class="qr-area">
  <img id="qr-img" src="" alt="QR Code" width="120" height="120">
  <p>掃描 QR Code 分享此遊戲</p>
</div>

<script>
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data='+encodeURIComponent(window.location.href);

const qs=[
  {before:'近年來，政府對二二八事件除了',blank:'公開道歉與賠償',after:'，也透過多種措施希望從事件中學習教訓並反思。',options:['公開道歉與賠償','實施軍事戒嚴','禁止討論事件','驅逐異見人士'],exp:'政府首先透過公開道歉與賠償，承認過去的錯誤，給予受難者家屬補償。'},
  {before:'政府透過',blank:'公布真相',after:'，讓社會大眾了解二二八事件的完整歷史。',options:['公布真相','繼續保密','銷毀檔案','禁止報導'],exp:'政府公布真相，讓歷史資料得以公開，幫助社會了解事件的來龍去脈。'},
  {before:'政府將每年2月28日訂為',blank:'紀念日',after:'，讓人民記住這段歷史。',options:['紀念日','假期','工作日','戒嚴日'],exp:'2月28日被訂為「二二八和平紀念日」，提醒國人珍惜得來不易的民主與人權。'},
  {before:'政府在全臺各地設立二二八',blank:'紀念碑與紀念館',after:'，促進人們相互理解與尊重。',options:['紀念碑與紀念館','軍事基地','政府機關','警察局'],exp:'全臺各地設有二二八紀念碑與紀念館，讓後人緬懷歷史，促進族群和解。'},
];

let cur=0,score=0;
function render(){
  const q=qs[cur];
  document.getElementById('qnum').textContent=`第 ${cur+1} 題／共 ${qs.length} 題`;
  document.getElementById('pbar').style.width=`${(cur/qs.length)*100}%`;
  document.getElementById('question').innerHTML=q.before+'<span class="blank-line" id="blank">？？？</span>'+q.after;
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='btn';
  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.options.forEach(o=>{
    const d=document.createElement('div');
    d.className='opt';d.textContent=o;
    d.onclick=()=>fill(o,d,q);
    opts.appendChild(d);
  });
}
function fill(val,el,q){
  document.querySelectorAll('.opt').forEach(o=>{o.classList.add('used');o.onclick=null;});
  const blank=document.getElementById('blank');
  const fb=document.getElementById('feedback');
  blank.textContent=val;
  if(val===q.blank){score++;el.classList.remove('used');el.classList.add('correct-src');fb.className='feedback show ok';fb.textContent='✅ 正確！'+q.exp;}
  else{blank.textContent=q.blank;blank.style.color='var(--R)';fb.className='feedback show no';fb.textContent='❌ 答錯了！正確答案是「'+q.blank+'」。'+q.exp;}
  document.getElementById('nextBtn').className='btn show';
}
function next(){cur++;if(cur>=qs.length){document.getElementById('card').style.display='none';document.getElementById('scorebox').className='score-box show';document.getElementById('scorenum').textContent=Math.round(score/qs.length*100);}else render();}
function restart(){cur=0;score=0;document.getElementById('card').style.display='';document.getElementById('scorebox').className='score-box';render();}
render();
</script>
</body>
</html>
