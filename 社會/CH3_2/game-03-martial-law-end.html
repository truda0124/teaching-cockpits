<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點3：解嚴 — 配對題</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{color:var(--Y);font-size:1.2rem;margin-bottom:4px;text-align:center;}
.subtitle{color:var(--faint);font-size:.8rem;margin-bottom:20px;}
.card{background:var(--board);border-radius:12px;padding:24px;max-width:560px;width:100%;}
.rule{color:var(--faint);font-size:.82rem;margin-bottom:18px;line-height:1.6;}
.match-area{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.col-title{color:var(--Y);font-size:.8rem;font-weight:700;margin-bottom:6px;text-align:center;}
.items{display:flex;flex-direction:column;gap:8px;}
.item{background:var(--dim);border:2px solid transparent;border-radius:8px;padding:10px 14px;cursor:pointer;font-size:.9rem;line-height:1.5;transition:all .2s;min-height:52px;display:flex;align-items:center;}
.item:hover{border-color:var(--faint);}
.item.selected{border-color:var(--Y);background:#2a2a00;}
.item.matched{border-color:var(--G);background:#1a3d1e;cursor:default;}
.item.wrong{border-color:var(--R);background:#3d1a1a;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.score-bar{display:flex;justify-content:space-between;align-items:center;max-width:560px;width:100%;margin-bottom:12px;}
.score{color:var(--Y);font-size:.9rem;}
.feedback-global{margin-top:16px;color:var(--faint);font-size:.85rem;min-height:40px;}
.result-card{display:none;background:var(--board);border-radius:12px;padding:30px;max-width:560px;width:100%;text-align:center;margin-top:12px;}
.result-card.show{display:block;}
.result-score{font-size:2.5rem;color:var(--Y);font-weight:700;margin:12px 0;}
.btn{padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:var(--Y);color:#1a1200;margin-top:16px;}
.qr-area{margin-top:30px;text-align:center;}
.qr-area img{border-radius:8px;border:3px solid var(--board);}
.qr-area p{color:var(--faint);font-size:.75rem;margin-top:6px;}
</style>
</head>
<body>
<h1>重點3：解嚴</h1>
<p class="subtitle">配對題 ✦ 左欄選事件，右欄選對應內容</p>
<div class="score-bar">
  <span class="score">配對成功：<span id="score">0</span> / 5</span>
</div>
<div class="card">
  <p class="rule">📌 先點選左欄的事件，再點選右欄對應的說明。配對正確會變綠色！</p>
  <div class="match-area">
    <div>
      <div class="col-title">📌 事件／人物</div>
      <div class="items" id="left-col"></div>
    </div>
    <div>
      <div class="col-title">📝 說明</div>
      <div class="items" id="right-col"></div>
    </div>
  </div>
  <div class="feedback-global" id="feedback"></div>
</div>
<div class="result-card" id="result">
  <div style="font-size:1.3rem;font-weight:700;color:var(--Y)">配對完成！🎉</div>
  <div class="result-score"><span id="final-score">0</span> / 5</div>
  <div style="color:var(--faint);font-size:.9rem" id="result-msg"></div>
  <button class="btn" onclick="restart()">再玩一次 🔄</button>
</div>
<div class="qr-area">
  <img id="qr-img" src="" width="100" height="100" alt="QR Code">
  <p>掃描分享此遊戲</p>
</div>
<script>
const pairs=[
  {left:"民國76年",right:"蔣經國宣布解嚴"},
  {left:"解嚴後言論自由",right:"新政黨、報社與電視臺陸續成立"},
  {left:"司法改變",right:"案件公正審判並公開結果"},
  {left:"解嚴後人民",right:"可走上街頭提出訴求"},
  {left:"蔣經國",right:"宣布解除戒嚴的總統"}
];
let selected=null,matched=0,errors=0;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const rightOrder=shuffle([...pairs.map((_,i)=>i)]);
function render(){
  const lc=document.getElementById('left-col');
  const rc=document.getElementById('right-col');
  lc.innerHTML='';rc.innerHTML='';
  pairs.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='item';d.textContent=p.left;d.dataset.idx=i;d.dataset.side='left';
    d.onclick=()=>selectItem(d);lc.appendChild(d);
  });
  rightOrder.forEach(i=>{
    const d=document.createElement('div');
    d.className='item';d.textContent=pairs[i].right;d.dataset.idx=i;d.dataset.side='right';
    d.onclick=()=>selectItem(d);rc.appendChild(d);
  });
}
function selectItem(el){
  if(el.classList.contains('matched'))return;
  if(!selected){
    if(el.dataset.side==='right')return;
    if(selected)selected.classList.remove('selected');
    selected=el;el.classList.add('selected');
    document.getElementById('feedback').textContent='現在請選右欄對應的說明 👉';
  } else {
    if(el.dataset.side==='left'){selected.classList.remove('selected');selected=el;el.classList.add('selected');return;}
    const li=parseInt(selected.dataset.idx);
    const ri=parseInt(el.dataset.idx);
    if(li===ri){
      selected.classList.remove('selected');
      selected.classList.add('matched');
      el.classList.add('matched');
      matched++;
      document.getElementById('score').textContent=matched;
      document.getElementById('feedback').textContent='✅ 配對正確！「'+pairs[li].left+'」→「'+pairs[li].right+'」';
      if(matched===pairs.length)setTimeout(showResult,600);
    } else {
      errors++;
      el.classList.add('wrong');
      selected.classList.add('wrong');
      document.getElementById('feedback').textContent='❌ 配對錯誤，請再試一次。';
      setTimeout(()=>{el.classList.remove('wrong');selected.classList.remove('wrong');},600);
    }
    selected.classList.remove('selected');selected=null;
  }
}
function showResult(){
  document.getElementById('result').classList.add('show');
  document.getElementById('final-score').textContent=matched;
  const msgs=['全部配對成功！真厲害 🏆','配對完成，有幾次錯誤，再複習一下吧 💪'];
  document.getElementById('result-msg').textContent=errors===0?msgs[0]:msgs[1];
}
function restart(){matched=0;errors=0;selected=null;document.getElementById('score').textContent=0;document.getElementById('result').classList.remove('show');document.getElementById('feedback').textContent='';render();}
render();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
