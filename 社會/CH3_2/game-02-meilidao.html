<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點2：美麗島事件 — 填充題</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{color:var(--Y);font-size:1.2rem;margin-bottom:4px;text-align:center;}
.subtitle{color:var(--faint);font-size:.8rem;margin-bottom:20px;}
.card{background:var(--board);border-radius:12px;padding:24px;max-width:560px;width:100%;}
.q-num{color:var(--faint);font-size:.8rem;margin-bottom:8px;}
.q-text{font-size:1.05rem;line-height:1.7;margin-bottom:18px;}
.blank-wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
input[type=text]{background:var(--dim);border:2px solid var(--faint);border-radius:8px;padding:10px 14px;color:var(--chalk);font-size:1rem;width:180px;outline:none;}
input[type=text]:focus{border-color:var(--B);}
input.correct{border-color:var(--G);background:#1a3d1e;}
input.wrong{border-color:var(--R);background:#3d1a1a;}
.btn-check{padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:var(--B);color:#0a1a2a;}
.feedback{margin-top:16px;padding:12px;border-radius:8px;font-size:.9rem;display:none;line-height:1.6;}
.feedback.show{display:block;}
.feedback.ok{background:#1a3d1e;border-left:4px solid var(--G);}
.feedback.ng{background:#3d1a1a;border-left:4px solid var(--R);}
.score-bar{display:flex;justify-content:space-between;align-items:center;max-width:560px;width:100%;margin-bottom:12px;}
.score{color:var(--Y);font-size:.9rem;}
.progress{color:var(--faint);font-size:.8rem;}
.nav{display:flex;gap:10px;margin-top:18px;}
.btn{padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;}
.btn-next{background:var(--B);color:#0a1a2a;}
.result-card{display:none;background:var(--board);border-radius:12px;padding:30px;max-width:560px;width:100%;text-align:center;}
.result-card.show{display:block;}
.result-score{font-size:2.5rem;color:var(--Y);font-weight:700;margin:12px 0;}
.hint{color:var(--faint);font-size:.8rem;margin-top:6px;}
.qr-area{margin-top:30px;text-align:center;}
.qr-area img{border-radius:8px;border:3px solid var(--board);}
.qr-area p{color:var(--faint);font-size:.75rem;margin-top:6px;}
</style>
</head>
<body>
<h1>重點2：美麗島事件</h1>
<p class="subtitle">填充題 ✦ 共5題</p>
<div class="score-bar">
  <span class="score">得分：<span id="score">0</span></span>
  <span class="progress"><span id="cur">1</span> / 5</span>
</div>
<div class="card" id="q-card">
  <div class="q-num" id="q-num"></div>
  <div class="q-text" id="q-text"></div>
  <div class="blank-wrap">
    <input type="text" id="ans-input" placeholder="請輸入答案" autocomplete="off">
    <button class="btn-check" onclick="checkAns()">確認</button>
  </div>
  <div class="hint" id="hint"></div>
  <div class="feedback" id="feedback"></div>
  <div class="nav">
    <button class="btn btn-next" id="btn-next" onclick="nextQ()" style="display:none">下一題 →</button>
  </div>
</div>
<div class="result-card" id="result">
  <div style="font-size:1.3rem;font-weight:700;color:var(--Y)">測驗完成！🎉</div>
  <div class="result-score"><span id="final-score">0</span> / 5</div>
  <div style="color:var(--faint);font-size:.9rem" id="result-msg"></div>
  <button class="btn" style="display:inline-block;margin-top:20px;background:var(--Y);color:#1a1200" onclick="restart()">再玩一次 🔄</button>
</div>
<div class="qr-area">
  <img id="qr-img" src="" width="100" height="100" alt="QR Code">
  <p>掃描分享此遊戲</p>
</div>
<script>
const qs=[
  {q:"美麗島事件發生在哪個城市？",ans:["高雄"],hint:"提示：南臺灣的大城市",exp:"美麗島事件發生在高雄，是民國68年（1979年）12月10日的事件。"},
  {q:"美麗島雜誌社以慶祝哪個節日為由申請舉辦遊行？",ans:["世界人權日"],hint:"提示：與人的基本權利有關的國際節日",exp:"美麗島雜誌社以慶祝「世界人權日」為由申請舉辦遊行與演講，但政府不同意。"},
  {q:"美麗島事件發生在民國幾年？（填數字）",ans:["68","民國68年","民國68"],hint:"提示：西元1979年對應的民國年份",exp:"美麗島事件發生在民國68年（西元1979年）。"},
  {q:"美麗島事件雖然讓許多人遭到判刑，卻引起了什麼反應？（填：引起______關注）",ans:["國際社會","國際"],hint:"提示：不是臺灣國內，而是全世界的……",exp:"美麗島事件引起國際社會關注，並激起更多人民參與政治改革。"},
  {q:"美麗島事件對臺灣民主化產生了什麼影響？（填：激起更多人民______）",ans:["參與政治改革","參與政治"],hint:"提示：讓更多人積極投入政治的……",exp:"美麗島事件激起更多人民參與政治改革，加速了臺灣民主化進程。"}
];
let cur=0,score=0,answered=false;
function render(){
  const q=qs[cur];
  document.getElementById('q-num').textContent=`第 ${cur+1} 題`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('cur').textContent=cur+1;
  document.getElementById('hint').textContent=q.hint;
  const inp=document.getElementById('ans-input');
  inp.value='';inp.className='';inp.disabled=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-next').style.display='none';
  answered=false;
  setTimeout(()=>inp.focus(),100);
}
function checkAns(){
  if(answered)return;
  const inp=document.getElementById('ans-input');
  const val=inp.value.trim();
  if(!val)return;
  answered=true;inp.disabled=true;
  const q=qs[cur];
  const ok=q.ans.some(a=>val===a||val.includes(a)||a.includes(val));
  const fb=document.getElementById('feedback');
  if(ok){score++;document.getElementById('score').textContent=score;inp.classList.add('correct');fb.className='feedback show ok';fb.textContent='✅ 答對了！'+q.exp;}
  else{inp.classList.add('wrong');fb.className='feedback show ng';fb.textContent='❌ 答錯了。正確答案是「'+q.ans[0]+'」。'+q.exp;}
  if(cur<qs.length-1)document.getElementById('btn-next').style.display='block';
  else setTimeout(showResult,800);
}
function nextQ(){cur++;render();}
function showResult(){
  document.getElementById('q-card').style.display='none';
  const r=document.getElementById('result');r.classList.add('show');
  document.getElementById('final-score').textContent=score;
  const msgs=['繼續加油！多讀幾遍課文吧 📖','不錯喔！再複習一下 💪','很棒！掌握了大部分重點 🌟','太厲害了！🏆'];
  document.getElementById('result-msg').textContent=score<=1?msgs[0]:score<=3?msgs[1]:score<=4?msgs[2]:msgs[3];
}
function restart(){cur=0;score=0;answered=false;document.getElementById('score').textContent=0;document.getElementById('q-card').style.display='block';document.getElementById('result').classList.remove('show');render();}
document.getElementById('ans-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkAns();});
render();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
