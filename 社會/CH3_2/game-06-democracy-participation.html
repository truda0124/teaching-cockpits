<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點6：共同參與民主社會 — 配對題</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{color:var(--Y);font-size:1.2rem;margin-bottom:4px;text-align:center;}
.subtitle{color:var(--faint);font-size:.8rem;margin-bottom:20px;}
.card{background:var(--board);border-radius:12px;padding:24px;max-width:560px;width:100%;}
.q-num{color:var(--faint);font-size:.8rem;margin-bottom:8px;}
.q-text{font-size:1.05rem;line-height:1.7;margin-bottom:18px;}
.choices{display:flex;flex-direction:column;gap:10px;}
.choice{background:var(--dim);border:2px solid transparent;border-radius:8px;padding:12px 16px;cursor:pointer;transition:all .2s;font-size:.95rem;}
.choice:hover{border-color:var(--faint);}
.choice.correct{border-color:var(--G);background:#1a3d1e;}
.choice.wrong{border-color:var(--R);background:#3d1a1a;}
.feedback{margin-top:16px;padding:12px;border-radius:8px;font-size:.9rem;display:none;line-height:1.6;}
.feedback.show{display:block;}
.feedback.ok{background:#1a3d1e;border-left:4px solid var(--G);}
.feedback.ng{background:#3d1a1a;border-left:4px solid var(--R);}
.score-bar{display:flex;justify-content:space-between;align-items:center;max-width:560px;width:100%;margin-bottom:12px;}
.score{color:var(--Y);font-size:.9rem;}
.progress{color:var(--faint);font-size:.8rem;}
.nav{margin-top:18px;}
.btn-next{padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:var(--B);color:#0a1a2a;display:none;}
.result-card{display:none;background:var(--board);border-radius:12px;padding:30px;max-width:560px;width:100%;text-align:center;}
.result-card.show{display:block;}
.result-score{font-size:2.5rem;color:var(--Y);font-weight:700;margin:12px 0;}
.btn{padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:var(--Y);color:#1a1200;margin-top:16px;}
.timeline{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.tl-item{display:flex;align-items:center;gap:10px;background:var(--dim);border-radius:8px;padding:10px 14px;}
.tl-year{color:var(--Y);font-weight:700;min-width:70px;font-size:.9rem;}
.tl-event{font-size:.9rem;}
.qr-area{margin-top:30px;text-align:center;}
.qr-area img{border-radius:8px;border:3px solid var(--board);}
.qr-area p{color:var(--faint);font-size:.75rem;margin-top:6px;}
</style>
</head>
<body>
<h1>重點6：共同參與民主社會</h1>
<p class="subtitle">選擇題 ✦ 共5題</p>
<div class="score-bar">
  <span class="score">得分：<span id="score">0</span></span>
  <span class="progress"><span id="cur">1</span> / 5</span>
</div>
<div class="card" id="q-card">
  <div class="q-num" id="q-num"></div>
  <div class="q-text" id="q-text"></div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <div class="nav">
    <button class="btn-next" id="btn-next" onclick="nextQ()">下一題 →</button>
  </div>
</div>
<div class="result-card" id="result">
  <div style="font-size:1.3rem;font-weight:700;color:var(--Y)">測驗完成！🎉</div>
  <div class="result-score"><span id="final-score">0</span> / 5</div>
  <div style="color:var(--faint);font-size:.9rem" id="result-msg"></div>
  <button class="btn" onclick="restart()">再玩一次 🔄</button>
</div>
<div class="qr-area">
  <img id="qr-img" src="" width="100" height="100" alt="QR Code">
  <p>掃描分享此遊戲</p>
</div>
<script>
const qs=[
  {q:"解嚴後，人民可以透過哪些方式了解社會議題與公共事務？",choices:["只能透過政府公告","透過報紙、電視及網路","只能透過學校教育","只能透過軍事廣播"],ans:1,exp:"解嚴後臺灣社會走向自由民主，人民可以透過報紙、電視及網路了解各種社會議題與公共事務。"},
  {q:"人民可以藉由哪種方式表達對公共議題的看法？",choices:["只能向總統直接請願","投書媒體、政府平臺或網路社群","只能參加政黨","向外國政府投訴"],ans:1,exp:"人民可藉由投書媒體、政府平臺或網路社群，表達對公共議題的看法。"},
  {q:"加入「理念相同的民間團體」主要是為了什麼目的？",choices:["賺取更多薪水","對政府及政策進行監督","獲得政府補貼","逃避兵役"],ans:1,exp:"加入理念相同的民間團體，可以對政府及政策進行監督，以實際行動共同創造自由民主的社會。"},
  {q:"以下哪一項是在學校參與公共事務的例子？",choices:["偷看同學的考卷","選舉自治小市長或透過班會決定班級事務","不參加任何活動","只服從老師的命令"],ans:1,exp:"在學校可以透過選舉自治小市長或班會討論班級事務，這些都是參與公共事務的方式。"},
  {q:"民主社會中，公民應該如何對待公共事務？",choices:["完全交給政府決定，不需關心","積極關注並共同守護民主","只關心自己的事","等有問題才出來發聲"],ans:1,exp:"我們透過探究解嚴前後的重要事件，可以發現人民的努力讓臺灣走向民主社會，因此要積極關注公共事務，共同守護民主。"}
];
let cur=0,score=0,answered=false;
function render(){
  const q=qs[cur];
  document.getElementById('q-num').textContent=`第 ${cur+1} 題`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('cur').textContent=cur+1;
  const cc=document.getElementById('choices');
  cc.innerHTML='';
  q.choices.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='choice';d.textContent=c;
    d.onclick=()=>answer(i);
    cc.appendChild(d);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-next').style.display='none';
  answered=false;
}
function answer(i){
  if(answered)return;answered=true;
  const q=qs[cur];
  const divs=document.querySelectorAll('.choice');
  const fb=document.getElementById('feedback');
  if(i===q.ans){score++;document.getElementById('score').textContent=score;divs[i].classList.add('correct');fb.className='feedback show ok';fb.textContent='✅ 答對了！'+q.exp;}
  else{divs[i].classList.add('wrong');divs[q.ans].classList.add('correct');fb.className='feedback show ng';fb.textContent='❌ 答錯了。正確答案是「'+q.choices[q.ans]+'」。'+q.exp;}
  if(cur<qs.length-1)document.getElementById('btn-next').style.display='block';
  else setTimeout(showResult,800);
}
function nextQ(){cur++;render();}
function showResult(){
  document.getElementById('q-card').style.display='none';
  const r=document.getElementById('result');r.classList.add('show');
  document.getElementById('final-score').textContent=score;
  const msgs=['繼續加油！📖','再複習一下 💪','很棒！🌟','滿分！🏆'];
  document.getElementById('result-msg').textContent=score<=1?msgs[0]:score<=3?msgs[1]:score<=4?msgs[2]:msgs[3];
}
function restart(){cur=0;score=0;answered=false;document.getElementById('score').textContent=0;document.getElementById('q-card').style.display='block';document.getElementById('result').classList.remove('show');render();}
render();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
