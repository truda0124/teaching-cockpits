<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點2：1公頃＝幾平方公尺</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Segoe UI',sans-serif;min-height:100vh;padding:20px;}
.container{max-width:560px;margin:0 auto;}
h1{color:var(--Y);font-size:1.3rem;text-align:center;margin-bottom:6px;}
.subtitle{color:var(--faint);font-size:.85rem;text-align:center;margin-bottom:20px;}
.score-bar{background:var(--dim);border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.score{color:var(--Y);font-weight:700;font-size:1.1rem;}
.hint-box{background:var(--dim);border-left:4px solid var(--Y);border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:.9rem;line-height:1.7;}
.hint-box strong{color:var(--Y);}
.question-card{background:var(--board);border-radius:14px;padding:24px;margin-bottom:16px;}
.q-text{font-size:1.1rem;margin-bottom:20px;line-height:1.7;}
.q-text .blank{display:inline-block;min-width:80px;border-bottom:3px solid var(--Y);color:var(--Y);font-weight:700;text-align:center;padding:0 8px;}
.input-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.fill-input{flex:1;background:var(--dim);border:2px solid #3a5a3c;color:var(--chalk);border-radius:10px;padding:12px 16px;font-size:1.1rem;outline:none;transition:border-color .2s;}
.fill-input:focus{border-color:var(--B);}
.fill-input.correct{border-color:var(--G);background:#1a4a20;}
.fill-input.wrong{border-color:var(--R);background:#4a1a1a;}
.check-btn{background:var(--B);color:#0a1a2a;border:none;border-radius:10px;padding:12px 20px;font-size:1rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.feedback{background:var(--dim);border-radius:10px;padding:14px;margin-top:14px;display:none;font-size:.9rem;line-height:1.6;}
.feedback.show{display:block;}
.feedback.ok{border-left:4px solid var(--G);}
.feedback.ng{border-left:4px solid var(--R);}
.next-btn{display:none;width:100%;margin-top:14px;padding:12px;background:var(--Y);color:#1a1a00;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;}
.next-btn.show{display:block;}
.result-card{background:var(--board);border-radius:14px;padding:30px;text-align:center;display:none;}
.result-card.show{display:block;}
.result-score{font-size:2.5rem;color:var(--Y);font-weight:700;margin:16px 0;}
.result-msg{color:var(--faint);margin-bottom:20px;}
.replay-btn{background:var(--G);color:#0a1a0a;border:none;border-radius:10px;padding:12px 28px;font-size:1rem;font-weight:700;cursor:pointer;}
.qr-section{text-align:center;margin-top:24px;padding:16px;background:var(--dim);border-radius:10px;}
.qr-section p{color:var(--faint);font-size:.8rem;margin-top:8px;}
</style>
</head>
<body>
<div class="container">
  <h1>🌾 重點2：1公頃＝幾平方公尺？</h1>
  <p class="subtitle">填入正確的數字，練習公頃換算！</p>

  <div class="hint-box">
    💡 記憶小技巧：<strong>1公頃 = 邊長100m的正方形</strong><br>
    100 × 100 = <strong>10,000 m²</strong>
  </div>

  <div class="score-bar">
    <span class="score">得分：<span id="score">0</span></span>
    <span class="progress" id="progress">第 1 / 6 題</span>
  </div>

  <div id="quiz-area">
    <div class="question-card">
      <div class="q-text" id="q-text"></div>
      <div class="input-row">
        <input class="fill-input" id="fill-input" type="number" placeholder="輸入數字" onkeydown="if(event.key==='Enter')checkAns()">
        <button class="check-btn" onclick="checkAns()">確認</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQ()">下一題 ➜</button>
    </div>
  </div>

  <div class="result-card" id="result-card">
    <div style="font-size:2rem;">🎉</div>
    <div class="result-score"><span id="final-score">0</span> / 6</div>
    <div class="result-msg" id="result-msg"></div>
    <button class="replay-btn" onclick="restart()">🔄 再玩一次</button>
  </div>

  <div class="qr-section">
    <img id="qr-img" src="" width="100" height="100" alt="QR Code">
    <p>掃描 QR Code 在手機上玩</p>
  </div>
</div>

<script>
const questions = [
  {q:'1 公頃 ＝ <span class="blank">？</span> 平方公尺',ans:10000,exp:'1公頃 = 10,000 m²。邊長100m的正方形，100×100=10,000。'},
  {q:'2 公頃 ＝ <span class="blank">？</span> 平方公尺',ans:20000,exp:'2公頃 = 2×10,000 = 20,000 m²'},
  {q:'5 公頃 ＝ <span class="blank">？</span> 平方公尺',ans:50000,exp:'5公頃 = 5×10,000 = 50,000 m²'},
  {q:'0.5 公頃 ＝ <span class="blank">？</span> 平方公尺',ans:5000,exp:'0.5公頃 = 0.5×10,000 = 5,000 m²'},
  {q:'3 公頃 ＝ <span class="blank">？</span> 平方公尺',ans:30000,exp:'3公頃 = 3×10,000 = 30,000 m²'},
  {q:'10 公頃 ＝ <span class="blank">？</span> 平方公尺',ans:100000,exp:'10公頃 = 10×10,000 = 100,000 m²（也等於0.1平方公里）'},
];

let cur=0,score=0,answered=false;

function render(){
  const q=questions[cur];
  document.getElementById('q-text').innerHTML=q.q;
  document.getElementById('progress').textContent=`第 ${cur+1} / ${questions.length} 題`;
  const inp=document.getElementById('fill-input');
  inp.value=''; inp.className='fill-input'; inp.disabled=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').className='next-btn';
  answered=false;
  setTimeout(()=>inp.focus(),100);
}

function checkAns(){
  if(answered)return;
  const val=parseFloat(document.getElementById('fill-input').value);
  if(isNaN(val)){alert('請輸入數字！');return;}
  answered=true;
  const q=questions[cur];
  const inp=document.getElementById('fill-input');
  const fb=document.getElementById('feedback');
  inp.disabled=true;
  if(val===q.ans){
    score++;inp.classList.add('correct');
    fb.className='feedback show ok';fb.innerHTML='✅ 答對了！'+q.exp;
  }else{
    inp.classList.add('wrong');
    fb.className='feedback show ng';fb.innerHTML=`❌ 答錯了！正確答案是 <strong style="color:var(--Y)">${q.ans.toLocaleString()}</strong>。${q.exp}`;
  }
  document.getElementById('score').textContent=score;
  document.getElementById('next-btn').className='next-btn show';
}

function nextQ(){
  cur++;
  if(cur>=questions.length){showResult();return;}
  render();
}

function showResult(){
  document.getElementById('quiz-area').style.display='none';
  const r=document.getElementById('result-card');
  r.className='result-card show';
  document.getElementById('final-score').textContent=score;
  const msgs=['再加油！多練習幾次吧！','有點進步，繼續努力！','不錯喔！','很棒！快要全對了！','優秀！幾乎全對！','🏆 太厲害了！全部答對！'];
  document.getElementById('result-msg').textContent=msgs[score]||msgs[5];
}

function restart(){
  cur=0;score=0;answered=false;
  document.getElementById('quiz-area').style.display='block';
  document.getElementById('result-card').className='result-card';
  document.getElementById('score').textContent='0';
  render();
}

render();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
