<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點1：動物的求偶行為 — 選擇題</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{color:var(--Y);font-size:1.3rem;text-align:center;margin-bottom:4px;}
.subtitle{color:var(--faint);font-size:.8rem;margin-bottom:18px;}
.progress{width:100%;max-width:520px;background:var(--dim);border-radius:8px;height:8px;margin-bottom:16px;}
.progress-bar{height:8px;background:var(--G);border-radius:8px;transition:width .4s;}
.card{background:var(--board);border-radius:14px;padding:22px;max-width:520px;width:100%;margin-bottom:16px;}
.q-num{color:var(--faint);font-size:.75rem;margin-bottom:8px;}
.q-text{font-size:1.05rem;line-height:1.6;margin-bottom:18px;}
.options{display:flex;flex-direction:column;gap:10px;}
.opt{background:var(--dim);border:2px solid transparent;border-radius:8px;padding:12px 16px;cursor:pointer;transition:all .2s;font-size:.95rem;text-align:left;}
.opt:hover{border-color:var(--B);}
.opt.correct{border-color:var(--G);background:#1a3a22;}
.opt.wrong{border-color:var(--R);background:#3a1a1a;}
.feedback{margin-top:14px;padding:12px;border-radius:8px;font-size:.9rem;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#1a3a22;border-left:4px solid var(--G);}
.feedback.ng{background:#3a1a1a;border-left:4px solid var(--R);}
.score-bar{display:flex;justify-content:space-between;align-items:center;max-width:520px;width:100%;padding:8px 0;}
.score{color:var(--Y);font-weight:700;}
.btn{background:var(--Y);color:#0a1a0a;border:none;border-radius:8px;padding:10px 24px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:12px;}
.btn:hover{opacity:.85;}
.btn.next{background:var(--B);color:#0a1a2a;}
.result-card{background:var(--board);border-radius:14px;padding:28px;max-width:520px;width:100%;text-align:center;display:none;}
.result-card.show{display:block;}
.result-score{font-size:2.5rem;color:var(--Y);font-weight:900;margin:12px 0;}
.qr-wrap{margin-top:24px;}
.qr-wrap img{border-radius:8px;border:3px solid var(--faint);}
.qr-wrap p{color:var(--faint);font-size:.75rem;margin-top:6px;}
</style>
</head>
<body>
<h1>🐸 重點1：動物的求偶行為</h1>
<p class="subtitle">選擇題 · 共 6 題 · 看誰得滿分！</p>
<div class="progress"><div class="progress-bar" id="prog"></div></div>
<div class="score-bar">
  <span id="q-counter" style="color:var(--faint);font-size:.85rem;">第 1 / 6 題</span>
  <span class="score">得分：<span id="score">0</span></span>
</div>

<div class="card" id="q-card">
  <div class="q-num" id="q-num"></div>
  <div class="q-text" id="q-text"></div>
  <div class="options" id="opts"></div>
  <div class="feedback" id="feedback"></div>
  <button class="btn next" id="next-btn" style="display:none" onclick="nextQ()">下一題 →</button>
</div>

<div class="result-card" id="result">
  <div style="font-size:2rem;">🏆</div>
  <div style="color:var(--Y);font-size:1.2rem;font-weight:700;margin-top:8px;">遊戲結束！</div>
  <div class="result-score" id="final-score"></div>
  <div id="result-msg" style="color:var(--faint);margin-bottom:16px;"></div>
  <button class="btn" onclick="restart()">🔄 重新挑戰</button>
  <div class="qr-wrap">
    <img id="qr-img" width="120" height="120" alt="QR Code">
    <p>掃描分享給同學</p>
  </div>
</div>

<script>
const QS = [
  {q:"雄蛙為了吸引雌蛙，會利用哪種方式求偶？",opts:["發光","發出蛙鳴聲","展示羽毛","揮舞大螯"],ans:1,exp:"雄蛙會發出響亮的蛙鳴聲來吸引雌蛙，這是以「聲音」求偶的典型例子。"},
  {q:"雄蠶蛾利用什麼器官尋找雌蠶蛾散發的氣味（性費洛蒙）？",opts:["複眼","觸角","口器","翅膀"],ans:1,exp:"雄蠶蛾有明顯的羽狀觸角，是偵測雌蠶蛾性費洛蒙的最佳接收器。"},
  {q:"雄孔雀求偶時，主要利用什麼方式吸引雌孔雀？",opts:["打鬥","發光","展示美麗羽毛","鳴叫"],ans:2,exp:"雄孔雀會展開一身鮮豔美麗的羽毛，這是以「展示外形」求偶的方式。"},
  {q:"螢火蟲利用哪種方式求偶？不同種類的螢火蟲靠什麼辨認同種異性？",opts:["氣味不同","發光顏色和頻率不同","叫聲不同","羽毛顏色不同"],ans:1,exp:"不同種類螢火蟲的發光顏色與頻率不同，同種雌雄才能互相辨認，光是牠們的求偶訊號。"},
  {q:"繁殖季時，雄彈塗魚如何吸引雌魚注意？",opts:["發出聲音","散發氣味","豎起背鰭在泥地轉圈跳舞","用打鬥決勝"],ans:2,exp:"雄彈塗魚會豎起背鰭、在泥地上轉圈跳舞，這是以「舞蹈」求偶的方式。"},
  {q:"雄鹿和招潮蟹求偶時，採用哪種相同的方式爭取交配權？",opts:["發光","鳴唱","打鬥","築巢"],ans:2,exp:"雄鹿用角互相撞擊，招潮蟹揮舞大螯決鬥，勝者才能獲得交配權，都是以「打鬥」求偶。"},
];

let cur=0, score=0, answered=false;

function render(){
  const q=QS[cur];
  document.getElementById('q-num').textContent=`第 ${cur+1} 題`;
  document.getElementById('q-counter').textContent=`第 ${cur+1} / ${QS.length} 題`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('prog').style.width=(cur/QS.length*100)+'%';
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=(i===0?'Ａ':i===1?'Ｂ':i===2?'Ｃ':'Ｄ')+'　'+o;
    b.onclick=()=>answer(i);
    opts.appendChild(b);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').innerHTML='';
  document.getElementById('next-btn').style.display='none';
  answered=false;
}

function answer(i){
  if(answered)return;
  answered=true;
  const q=QS[cur];
  const btns=document.querySelectorAll('.opt');
  btns[q.ans].classList.add('correct');
  const fb=document.getElementById('feedback');
  if(i===q.ans){
    score++;
    document.getElementById('score').textContent=score;
    btns[i].classList.add('correct');
    fb.className='feedback ok show';
    fb.innerHTML='✅ 答對了！'+q.exp;
  } else {
    btns[i].classList.add('wrong');
    fb.className='feedback ng show';
    fb.innerHTML='❌ 答錯了。正確答案是【'+(q.ans===0?'Ａ':q.ans===1?'Ｂ':q.ans===2?'Ｃ':'Ｄ')+'】。'+q.exp;
  }
  document.getElementById('next-btn').style.display='inline-block';
}

function nextQ(){
  cur++;
  if(cur>=QS.length){showResult();}else{render();}
}

function showResult(){
  document.getElementById('q-card').style.display='none';
  document.getElementById('prog').style.width='100%';
  const r=document.getElementById('result');
  r.classList.add('show');
  const pct=Math.round(score/QS.length*100);
  document.getElementById('final-score').textContent=score+' / '+QS.length+' 分';
  document.getElementById('result-msg').textContent=pct===100?'🎉 完美！全對！你是求偶行為達人！':pct>=67?'👍 不錯！再複習一下就更棒了！':'💪 繼續加油！多看幾遍課本就能進步！';
}

function restart(){
  cur=0;score=0;
  document.getElementById('score').textContent='0';
  document.getElementById('q-card').style.display='block';
  document.getElementById('result').classList.remove('show');
  render();
}

render();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=120x120&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
