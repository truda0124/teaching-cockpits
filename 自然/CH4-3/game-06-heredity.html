<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點6：代代相傳 — 是非題</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{color:var(--Y);font-size:1.3rem;text-align:center;margin-bottom:4px;}
.subtitle{color:var(--faint);font-size:.8rem;margin-bottom:18px;}
.progress{width:100%;max-width:520px;background:var(--dim);border-radius:8px;height:8px;margin-bottom:16px;}
.progress-bar{height:8px;background:var(--G);border-radius:8px;transition:width .4s;}
.card{background:var(--board);border-radius:14px;padding:22px;max-width:520px;width:100%;margin-bottom:16px;}
.q-num{color:var(--faint);font-size:.75rem;margin-bottom:8px;}
.q-text{font-size:1.05rem;line-height:1.6;margin-bottom:22px;text-align:center;}
.tf-row{display:flex;gap:16px;justify-content:center;}
.tf-btn{flex:1;max-width:160px;padding:18px;border:2px solid var(--faint);background:var(--dim);border-radius:12px;cursor:pointer;font-size:1.4rem;font-weight:700;color:var(--chalk);transition:all .2s;}
.tf-btn:hover{border-color:var(--B);}
.tf-btn.correct{border-color:var(--G);background:#1a3a22;}
.tf-btn.wrong{border-color:var(--R);background:#3a1a1a;}
.feedback{margin-top:14px;padding:12px;border-radius:8px;font-size:.9rem;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#1a3a22;border-left:4px solid var(--G);}
.feedback.ng{background:#3a1a1a;border-left:4px solid var(--R);}
.score-bar{display:flex;justify-content:space-between;align-items:center;max-width:520px;width:100%;padding:8px 0;}
.score{color:var(--Y);font-weight:700;}
.btn{background:var(--Y);color:#0a1a0a;border:none;border-radius:8px;padding:10px 24px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:12px;}
.btn.next{background:var(--B);color:#0a1a2a;}
.trait-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
.trait-item{background:var(--dim);border-radius:8px;padding:8px;text-align:center;font-size:.85rem;}
.trait-item span{display:block;color:var(--Y);font-size:.75rem;margin-bottom:2px;}
.result-card{background:var(--board);border-radius:14px;padding:28px;max-width:520px;width:100%;text-align:center;display:none;}
.result-card.show{display:block;}
.result-score{font-size:2.5rem;color:var(--Y);font-weight:900;margin:12px 0;}
.qr-wrap{margin-top:24px;}
.qr-wrap img{border-radius:8px;border:3px solid var(--faint);}
.qr-wrap p{color:var(--faint);font-size:.75rem;margin-top:6px;}
</style>
</head>
<body>
<h1>🧬 重點6：代代相傳</h1>
<p class="subtitle">是非題 · 共 6 題 · 遺傳與變異大考驗！</p>
<div class="progress"><div class="progress-bar" id="prog"></div></div>
<div class="score-bar">
  <span id="q-counter" style="color:var(--faint);font-size:.85rem;">第 1 / 6 題</span>
  <span class="score">得分：<span id="score">0</span></span>
</div>

<div class="card" id="q-card">
  <div class="q-num" id="q-num"></div>
  <div class="q-text" id="q-text"></div>
  <div class="tf-row">
    <button class="tf-btn" id="t-btn" onclick="answer(true)">⭕ 對</button>
    <button class="tf-btn" id="f-btn" onclick="answer(false)">╳ 錯</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <button class="btn next" id="next-btn" style="display:none" onclick="nextQ()">下一題 →</button>
</div>

<div class="result-card" id="result">
  <div style="font-size:2rem;">🏆</div>
  <div style="color:var(--Y);font-size:1.2rem;font-weight:700;margin-top:8px;">遊戲結束！</div>
  <div class="result-score" id="final-score"></div>
  <div id="result-msg" style="color:var(--faint);margin-bottom:16px;"></div>
  <button class="btn" onclick="restart()">🔄 重新挑戰</button>
  <div style="margin-top:16px;background:var(--dim);border-radius:10px;padding:14px;">
    <p style="color:var(--Y);font-weight:700;font-size:.9rem;margin-bottom:8px;">📋 人類常見的遺傳性狀</p>
    <div class="trait-grid">
      <div class="trait-item"><span>眼睛</span>雙眼皮 / 單眼皮</div>
      <div class="trait-item"><span>額頭</span>有美人尖 / 無美人尖</div>
      <div class="trait-item"><span>耳垂</span>分離 / 緊貼臉頰</div>
      <div class="trait-item"><span>拇指</span>豎起挺直 / 豎起彎曲</div>
    </div>
  </div>
  <div class="qr-wrap">
    <img id="qr-img" width="120" height="120" alt="QR Code">
    <p>掃描分享給同學</p>
  </div>
</div>

<script>
const QS=[
  {q:"動物藉著生殖行為代代繁衍，親代會將部分外形特徵遺傳給子代。",ans:true,exp:"正確！親代有些外形特徵（如顏色、體型）會遺傳給子代，這就是遺傳現象。"},
  {q:"子代和親代的外形特徵「完全相同」，沒有任何差異。",ans:false,exp:"錯誤！子代與親代的性狀「既有相似，也有相異」。生物個體間有差異性，所以子代不會和親代完全一樣。"},
  {q:"人類的「單/雙眼皮」和「有無美人尖」都是可觀察的遺傳性狀。",ans:true,exp:"正確！單/雙眼皮、有無美人尖、耳垂是否分離、拇指豎起是否彎曲，都是人類容易觀察的遺傳性狀。"},
  {q:"生物個體間的性狀具有差異性，因此子代和親代不可能有相似的地方。",ans:false,exp:"錯誤！子代與親代「既有相似之處，也有相異之處」。遺傳讓子代與親代相似，變異讓個體間有差異。"},
  {q:"耳垂緊貼臉頰和耳垂分離，是一種可觀察到的人類遺傳性狀差異。",ans:true,exp:"正確！耳垂是否緊貼臉頰是一種遺傳性狀，可以在自己和家人身上觀察並比較。"},
  {q:"動物只有透過遺傳才能延續生命，繁殖行為與生命延續無關。",ans:false,exp:"錯誤！動物是藉由「生殖行為」（求偶、交配、繁殖、育幼）代代繁衍，並透過遺傳將特徵傳給子代，兩者密切相關。"},
];

let cur=0,score=0,answered=false;

function render(){
  const q=QS[cur];
  document.getElementById('q-num').textContent=`第 ${cur+1} 題`;
  document.getElementById('q-counter').textContent=`第 ${cur+1} / ${QS.length} 題`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('prog').style.width=(cur/QS.length*100)+'%';
  document.getElementById('t-btn').className='tf-btn';
  document.getElementById('f-btn').className='tf-btn';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').style.display='none';
  answered=false;
}

function answer(val){
  if(answered)return;answered=true;
  const q=QS[cur];const correct=val===q.ans;
  const tb=document.getElementById('t-btn'),fb2=document.getElementById('f-btn');
  if(q.ans)tb.classList.add('correct');else fb2.classList.add('correct');
  if(val!==q.ans)(val?tb:fb2).classList.add('wrong');
  const fb=document.getElementById('feedback');
  if(correct){score++;document.getElementById('score').textContent=score;fb.className='feedback ok show';fb.innerHTML='✅ 答對了！'+q.exp;}
  else{fb.className='feedback ng show';fb.innerHTML='❌ 答錯了。'+q.exp;}
  document.getElementById('next-btn').style.display='inline-block';
}

function nextQ(){cur++;cur>=QS.length?showResult():render();}

function showResult(){
  document.getElementById('q-card').style.display='none';
  document.getElementById('prog').style.width='100%';
  const r=document.getElementById('result');r.classList.add('show');
  const pct=Math.round(score/QS.length*100);
  document.getElementById('final-score').textContent=score+' / '+QS.length+' 分';
  document.getElementById('result-msg').textContent=pct===100?'🎉 完美！遺傳與變異全懂！':pct>=67?'👍 不錯！再想想錯的部分！':'💪 多複習遺傳與變異的概念！';
}

function restart(){cur=0;score=0;document.getElementById('score').textContent='0';document.getElementById('q-card').style.display='block';document.getElementById('result').classList.remove('show');render();}

render();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=120x120&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
