<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點4：微生物在生活的運用配對</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{color:var(--Y);font-size:1.3rem;text-align:center;margin-bottom:6px;}
.subtitle{color:var(--faint);font-size:.85rem;margin-bottom:20px;text-align:center;}
.score-bar{display:flex;gap:16px;margin-bottom:18px;font-size:.9rem;}
.score-bar span{color:var(--faint);}.score-bar b{color:var(--Y);}
.card{background:var(--board);border-radius:14px;padding:24px;max-width:560px;width:100%;margin-bottom:16px;}
.progress-text{text-align:center;color:var(--faint);font-size:.85rem;margin-bottom:12px;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.col-label{color:var(--Y);font-size:.8rem;font-weight:700;margin-bottom:4px;}
.item-btn{background:var(--dim);border:2px solid #2e4a30;color:var(--chalk);border-radius:8px;padding:10px 8px;font-size:.85rem;cursor:pointer;text-align:center;transition:all .2s;width:100%;}
.item-btn.selected{border-color:var(--Y);color:var(--Y);background:#1a2e1a;}
.item-btn.matched-ok{border-color:var(--G);background:#0d2e15;color:var(--G);cursor:default;}
.item-btn.matched-ng{border-color:var(--R);background:#2e0d0d;color:var(--R);}
.feedback{margin-top:14px;padding:12px;border-radius:8px;font-size:.9rem;line-height:1.5;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#0d2e15;border:1px solid var(--G);color:var(--G);}
.feedback.ng{background:#2e0d0d;border:1px solid var(--R);color:var(--R);}
.result{background:var(--board);border-radius:14px;padding:30px;text-align:center;max-width:560px;width:100%;display:none;}
.result.show{display:block;}
.result h2{color:var(--Y);font-size:1.4rem;margin-bottom:12px;}
.result p{color:var(--faint);margin-bottom:20px;}
.replay-btn{padding:12px 32px;background:var(--G);color:#0a1a0a;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
.qr-area{margin-top:28px;text-align:center;}
.qr-area p{color:var(--faint);font-size:.75rem;margin-top:6px;}
</style>
</head>
<body>
<h1>🍞 重點4：微生物在生活的運用</h1>
<p class="subtitle">將微生物和它的用途配對！</p>
<div class="score-bar"><span>得分：</span><b id="score">0</b><span> / </span><b id="total-q">5</b></div>
<div class="card" id="q-card">
  <div class="progress-text" id="prog-text">請先點左側微生物，再點右側用途</div>
  <div class="match-grid">
    <div>
      <div class="col-label">🦠 微生物</div>
      <button class="item-btn" id="a0" onclick="selectA(0)">乳酸菌</button>
      <button class="item-btn" id="a1" onclick="selectA(1)">酵母菌</button>
      <button class="item-btn" id="a2" onclick="selectA(2)">米麴菌</button>
      <button class="item-btn" id="a3" onclick="selectA(3)">青黴菌</button>
      <button class="item-btn" id="a4" onclick="selectA(4)">酵母菌(2)</button>
    </div>
    <div>
      <div class="col-label">🍽️ 用途/產品</div>
      <button class="item-btn" id="m0" onclick="selectM(0)">製作優格、優酪乳</button>
      <button class="item-btn" id="m1" onclick="selectM(1)">使麵團蓬鬆，製作麵包</button>
      <button class="item-btn" id="m2" onclick="selectM(2)">製作味噌</button>
      <button class="item-btn" id="m3" onclick="selectM(3)">提煉盤尼西林（抗生素）</button>
      <button class="item-btn" id="m4" onclick="selectM(4)">將糖發酵成酒精，釀造食醋</button>
    </div>
  </div>
  <div class="feedback" id="feedback"></div>
</div>
<div class="result" id="result">
  <h2 id="result-title"></h2>
  <p id="result-msg"></p>
  <button class="replay-btn" onclick="startGame()">🔄 再玩一次</button>
</div>
<div class="qr-area"><img id="qr-img" width="100" height="100" alt="QR Code"><p>掃描開啟此遊戲</p></div>
<script>
// ANSWERS[i] = method index for animal i
// 乳酸菌→優格, 酵母菌→麵包, 米麴菌→味噌, 青黴菌→盤尼西林, 酵母菌(2)→食醋
const ANSWERS=[0,1,2,3,4];
const NAMES=['乳酸菌','酵母菌','米麴菌','青黴菌','酵母菌'];
const METHODS=['製作優格、優酪乳','使麵團蓬鬆，製作麵包','製作味噌','提煉盤尼西林（抗生素）','將糖發酵成酒精，釀造食醋'];
let selA=-1,matched=[],score=0;
// Fix display names
document.getElementById('a4').textContent='酵母菌';
function startGame(){selA=-1;matched=[];score=0;document.getElementById('result').classList.remove('show');document.getElementById('q-card').style.display='block';document.getElementById('score').textContent=0;updateUI();}
function updateUI(){
  for(let i=0;i<5;i++){
    const ab=document.getElementById('a'+i),mb=document.getElementById('m'+ANSWERS[i]);
    if(matched.includes(i)){ab.className='item-btn matched-ok';ab.disabled=true;mb.className='item-btn matched-ok';mb.disabled=true;}
    else{ab.className='item-btn'+(selA===i?' selected':'');ab.disabled=false;mb.className='item-btn';mb.disabled=false;}
  }
  document.getElementById('prog-text').textContent='已配對：'+matched.length+' / 5';
}
function selectA(i){if(matched.includes(i))return;selA=i;updateUI();}
function selectM(mi){
  if(selA<0)return;
  const fb=document.getElementById('feedback');
  if(ANSWERS[selA]===mi){
    score++;matched.push(selA);document.getElementById('score').textContent=score;
    fb.className='feedback ok show';fb.textContent='✅ 正確！'+NAMES[selA]+'→'+METHODS[mi];
    selA=-1;updateUI();
    if(matched.length===5)setTimeout(showResult,800);
  }else{
    fb.className='feedback ng show';fb.textContent='❌ 不對！'+NAMES[selA]+'對應的是「'+METHODS[ANSWERS[selA]]+'」，再想想！';
    document.getElementById('a'+selA).classList.add('matched-ng');
    setTimeout(()=>{if(!matched.includes(selA))document.getElementById('a'+selA).classList.remove('matched-ng');selA=-1;updateUI();fb.className='feedback';},1200);
  }
}
function showResult(){
  document.getElementById('q-card').style.display='none';
  document.getElementById('result').classList.add('show');
  document.getElementById('result-title').textContent='得分：'+score+' / 5';
  document.getElementById('result-msg').textContent=score===5?'全部配對正確！微生物運用全掌握！':score>=3?'配對得不錯！再複習幾個微生物的用途！':'繼續加油！記住：乳酸菌→優格、酵母菌→麵包、米麴菌→味噌、青黴菌→抗生素！';
}
startGame();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
