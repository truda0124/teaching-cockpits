<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>重點3：食物鏈</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:20px;}
h1{color:var(--Y);text-align:center;font-size:1.3rem;margin-bottom:4px;}
.subtitle{color:var(--faint);text-align:center;font-size:.85rem;margin-bottom:20px;}
.score-bar{text-align:center;color:var(--Y);margin-bottom:16px;}
.progress{height:6px;background:var(--dim);border-radius:3px;margin-bottom:20px;max-width:560px;margin-left:auto;margin-right:auto;}
.progress-fill{height:100%;background:var(--G);border-radius:3px;transition:width .4s;}
.card{background:var(--board);border-radius:12px;padding:20px;max-width:560px;margin:0 auto 16px;}
.q-num{color:var(--G);font-size:.8rem;margin-bottom:8px;}
.q-text{font-size:1rem;line-height:1.6;margin-bottom:14px;}
.match-area{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:16px;}
.left-col,.right-col{display:flex;flex-direction:column;gap:8px;}
.item{background:var(--dim);border:1.5px solid #3a5a3c;border-radius:8px;padding:8px 12px;font-size:.9rem;cursor:pointer;transition:all .2s;text-align:center;}
.item.selected{border-color:var(--Y);color:var(--Y);}
.item.matched-ok{border-color:var(--G);background:#1a4020;color:var(--G);cursor:default;}
.item.matched-ng{border-color:var(--R);background:#3a1010;color:var(--R);}
.arrow{color:var(--faint);font-size:1.2rem;text-align:center;}
.feedback{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:.9rem;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#1a4020;color:var(--G);}
.feedback.ng{background:#3a1010;color:var(--R);}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{background:var(--dim);border:1.5px solid #3a5a3c;border-radius:8px;padding:10px 14px;cursor:pointer;font-size:.95rem;transition:all .2s;}
.opt:hover{border-color:var(--Y);color:var(--Y);}
.opt.correct{border-color:var(--G);background:#1a4020;color:var(--G);}
.opt.wrong{border-color:var(--R);background:#3a1010;color:var(--R);}
.btn{display:block;margin:20px auto 0;padding:10px 28px;background:var(--B);color:#0a1a2a;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
.qr-wrap{text-align:center;margin-top:24px;}
.qr-wrap p{color:var(--faint);font-size:.8rem;margin-top:6px;}
</style>
</head>
<body>
<h1>🌿 重點3：食物鏈</h1>
<p class="subtitle">五年級自然 L4-1 動物偵查員｜配對題</p>
<div class="score-bar">得分：<span id="score">0</span> / <span id="total">5</span></div>
<div class="progress"><div class="progress-fill" id="prog" style="width:0%"></div></div>
<div id="quiz-area"></div>
<button class="btn" id="restart-btn" style="display:none" onclick="restart()">🔄 重新挑戰</button>
<div class="qr-wrap">
  <img id="qr-img" src="" width="100" height="100" alt="QR Code">
  <p>掃描進入此遊戲</p>
</div>
<script>
const qs=[
  {q:"藻類 → ？ → 虱目魚",opts:["弧邊招潮蟹","小白鷺","大鱗鮻","蜻蜓"],ans:0,exp:"食物鏈：藻類（生產者）→ 弧邊招潮蟹（一級消費者）→ 虱目魚（二級消費者）。"},
  {q:"食物鏈中，「生產者」指的是哪一類生物？",opts:["能自行製造養分的植物或藻類","以植物為食的動物","以動物為食的肉食性動物","所有動物"],ans:0,exp:"生產者能自行行光合作用製造養分，例如藻類、植物。"},
  {q:"「一級消費者」吃什麼？",opts:["以生產者為食物","以一級消費者為食物","以二級消費者為食物","以所有生物為食物"],ans:0,exp:"一級消費者直接以生產者（藻類、植物）為食。"},
  {q:"在食物鏈中，箭頭的方向代表什麼？",opts:["獵捕的方向","能量（物質）流動的方向","大小的比較","數量的多寡"],ans:1,exp:"食物鏈箭頭代表能量與物質的流動方向，從被吃者指向吃者。"},
  {q:"下列哪一條食物鏈順序正確？",opts:["小白鷺→虱目魚→藻類","藻類→招潮蟹→虱目魚→小白鷺","虱目魚→藻類→招潮蟹","招潮蟹→藻類→小白鷺"],ans:1,exp:"正確順序：藻類（生產者）→招潮蟹（一級消費者）→虱目魚（二級消費者）→小白鷺（三級消費者）。"}
];
let cur=0,score=0;
function render(){
  if(cur>=qs.length){showResult();return;}
  const q=qs[cur];
  document.getElementById('prog').style.width=Math.round(cur/qs.length*100)+'%';
  const shuffled=[...q.opts.map((o,i)=>({o,i}))].sort(()=>Math.random()-.5);
  let html=`<div class="card"><div class="q-num">第 ${cur+1} 題 / 共 ${qs.length} 題</div>
  <div class="q-text">${q.q}</div><div class="opts">`;
  shuffled.forEach(({o,i})=>{ html+=`<button class="opt" onclick="choose(${i})">${o}</button>`; });
  html+=`</div><div class="feedback" id="fb"></div></div>`;
  document.getElementById('quiz-area').innerHTML=html;
}
function choose(i){
  const q=qs[cur];
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>o.onclick=null);
  const fb=document.getElementById('fb');
  let clicked;
  opts.forEach(o=>{ if(parseInt(o.getAttribute('onclick')?.match(/\d+/)?.[0])===i) clicked=o; });
  document.querySelectorAll('.opt').forEach((o,idx)=>{
    const val=o.textContent;
    const realIdx=q.opts.indexOf(val);
    if(realIdx===i) clicked=o;
  });
  if(i===q.ans){
    fb.className='feedback show ok';fb.textContent='✅ 答對了！'+q.exp;
    score++;document.getElementById('score').textContent=score;
  } else {
    fb.className='feedback show ng';fb.textContent='❌ 答錯了！正確答案是「'+q.opts[q.ans]+'」。'+q.exp;
  }
  opts.forEach(o=>{
    const ri=q.opts.indexOf(o.textContent);
    if(ri===q.ans) o.classList.add('correct');
    else if(ri===i) o.classList.add('wrong');
  });
  setTimeout(()=>{cur++;render();},2200);
}
function showResult(){
  document.getElementById('prog').style.width='100%';
  document.getElementById('quiz-area').innerHTML=`<div class="card" style="text-align:center">
  <div style="font-size:2rem;margin-bottom:12px">${score>=4?'🏆':'📚'}</div>
  <div style="color:var(--Y);font-size:1.3rem;font-weight:700">得分：${score} / ${qs.length}</div>
  <div style="color:var(--faint);margin-top:8px">${score===5?'滿分！超厲害！':score>=3?'不錯！再複習一下吧':'繼續加油！'}</div>
  </div>`;
  document.getElementById('restart-btn').style.display='block';
}
function restart(){cur=0;score=0;document.getElementById('score').textContent=0;document.getElementById('restart-btn').style.display='none';render();}
render();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
