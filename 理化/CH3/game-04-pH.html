<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>йҮҚй»һ4пјҡpHеҖјиҲҮй…ёй№јзЁӢеәҰ</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:20px;}
.container{max-width:560px;margin:0 auto;}
h1{color:var(--Y);font-size:1.3rem;text-align:center;margin-bottom:4px;}
.subtitle{color:var(--faint);font-size:.8rem;text-align:center;margin-bottom:20px;}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:var(--dim);border-radius:8px;padding:10px 16px;margin-bottom:16px;}
.score{color:var(--G);font-weight:700;font-size:1.1rem;}
.progress{color:var(--faint);font-size:.85rem;}
.card{background:var(--board);border-radius:12px;padding:20px;margin-bottom:14px;}
.question{font-size:1rem;line-height:1.6;margin-bottom:16px;}
.ph-scale{display:flex;border-radius:8px;overflow:hidden;height:32px;margin-bottom:12px;}
.ph-seg{flex:1;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#000;}
.options{display:grid;gap:10px;}
.opt{background:var(--dim);border:2px solid transparent;border-radius:8px;padding:12px 16px;cursor:pointer;font-size:.9rem;transition:all .2s;text-align:left;color:var(--chalk);}
.opt:hover{border-color:var(--B);}
.opt.correct{border-color:var(--G);background:#1a3d20;}
.opt.wrong{border-color:var(--R);background:#3d1a1a;}
.feedback{margin-top:14px;padding:12px;border-radius:8px;font-size:.88rem;line-height:1.5;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#1a3d20;border-left:4px solid var(--G);}
.feedback.ng{background:#3d1a1a;border-left:4px solid var(--R);}
.next-btn{display:none;width:100%;margin-top:14px;padding:12px;background:var(--B);color:#0a1a2a;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
.result{text-align:center;padding:30px 20px;}
.result h2{color:var(--Y);font-size:1.5rem;margin-bottom:12px;}
.final-score{font-size:2.5rem;color:var(--G);font-weight:900;margin:16px 0;}
.replay-btn{padding:12px 32px;background:var(--Y);color:#1a1a00;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
.qr-section{text-align:center;margin-top:20px;padding:16px;background:var(--dim);border-radius:8px;}
.qr-section p{color:var(--faint);font-size:.75rem;margin-top:8px;}
</style>
</head>
<body>
<div class="container">
  <h1>рҹ“Ҡ йҮҚй»һ4пјҡpHеҖјиҲҮй…ёй№јзЁӢеәҰ</h1>
  <p class="subtitle">еңӢдёӯзҗҶеҢ– з¬¬3з«  й…ёгҖҒй№јгҖҒй№ҪпҪңйҒёж“ҮйЎҢ</p>
  <div class="score-bar">
    <span class="score">еҫ—еҲҶпјҡ<span id="score">0</span></span>
    <span class="progress"><span id="cur">1</span> / <span id="total">6</span></span>
  </div>
  <div class="ph-scale">
    <div class="ph-seg" style="background:#d63031">1</div>
    <div class="ph-seg" style="background:#e17055">3</div>
    <div class="ph-seg" style="background:#fdcb6e">5</div>
    <div class="ph-seg" style="background:#ffeaa7">6</div>
    <div class="ph-seg" style="background:#dfe6e9">7</div>
    <div class="ph-seg" style="background:#74b9ff">8</div>
    <div class="ph-seg" style="background:#0984e3">9</div>
    <div class="ph-seg" style="background:#6c5ce7">11</div>
    <div class="ph-seg" style="background:#2d3436;color:#fff">14</div>
  </div>
  <div id="quiz-area"></div>
  <div id="result" class="result" style="display:none">
    <h2>рҹҺү жё¬й©—е®ҢжҲҗпјҒ</h2>
    <div class="final-score"><span id="final">0</span> / 6</div>
    <p style="color:var(--faint)">pHеҖјжҰӮеҝөжҺҢжҸЎеәҰ</p>
    <button class="replay-btn" onclick="startQuiz()">рҹ”„ еҶҚзҺ©дёҖж¬Ў</button>
  </div>
  <div class="qr-section">
    <img id="qr-img" src="" width="100" height="100" alt="QR Code">
    <p>жҺғжҸҸ QR Code еҲҶдә«жӯӨйҒҠжҲІ</p>
  </div>
</div>
<script>
const questions=[
  {q:"жҹҗжә¶ж¶Ізҡ„pHеҖјзӮә3пјҢи«Ӣе•ҸжӯӨжә¶ж¶Іеұ¬ж–јдёӢеҲ—дҪ•зЁ®жҖ§иіӘпјҹ",opts:["еј·й№јжҖ§","ејұй№јжҖ§","дёӯжҖ§","й…ёжҖ§"],ans:3,explain:"pH < 7 зӮәй…ёжҖ§пјҢpH = 7 зӮәдёӯжҖ§пјҢpH > 7 зӮәй№јжҖ§гҖӮpH = 3 < 7пјҢж•…зӮәй…ёжҖ§гҖӮ"},
  {q:"дёӢеҲ—дҪ•иҖ…й—ңж–јpHеҖјзҡ„ж•ҳиҝ°жҳҜжӯЈзўәзҡ„пјҹ",opts:["pHеҖји¶ҠеӨ§пјҢй…ёжҖ§и¶Ҡеј·","pH = 7 зҡ„жә¶ж¶ІдёҖе®ҡжҳҜй…ёжҖ§","pHеҖји¶Ҡе°ҸпјҢжә¶ж¶ІдёӯHвҒәжҝғеәҰи¶ҠеӨ§","дёӯжҖ§жә¶ж¶Ізҡ„pHеҖјеҝ…е®ҡе°Ҹж–ј7"],ans:2,explain:"pHеҖји¶Ҡе°ҸпјҢHвҒәжҝғеәҰи¶ҠеӨ§пјҢй…ёжҖ§и¶Ҡеј·гҖӮpH = 7 зӮәдёӯжҖ§пјҢpH > 7 зӮәй№јжҖ§гҖӮ"},
  {q:"е»Јз”Ёи©ҰзҙҷпјҲе»Јз”ЁжҢҮзӨәеҠ‘пјүзҡ„з”ЁйҖ”жҳҜд»Җйәјпјҹ",opts:["еҸӘиғҪеҲӨж–·жә¶ж¶ІжҳҜй…ёжҖ§йӮ„жҳҜй№јжҖ§","ж №ж“ҡдёҚеҗҢpHеҖје‘ҲзҸҫдёҚеҗҢйЎҸиүІпјҢеҸҜдј°жё¬pHеҖј","жё¬йҮҸжә¶ж¶Ізҡ„жә«еәҰ","еҲӨж–·жә¶ж¶ІжҳҜеҗҰиғҪе°Һйӣ»"],ans:1,explain:"е»Јз”Ёи©ҰзҙҷиғҪж №ж“ҡдёҚеҗҢй…ёй№јзЁӢеәҰе‘ҲзҸҫдёҚеҗҢйЎҸиүІпјҢеҸҜз”ЁдҫҶдј°жё¬жә¶ж¶Ізҡ„pHеҖјпјҢжҜ”зҹіи•Ҡи©ҰзҙҷжҸҗдҫӣжӣҙеӨҡиіҮиЁҠгҖӮ"},
  {q:"зҙ”ж°ҙеңЁ25В°CжҷӮпјҢpHеҖјзҙ„зӮә7гҖӮйҖҷд»ЈиЎЁзҙ”ж°ҙдёӯHвҒәиҲҮOHвҒ»зҡ„жҝғеәҰй—ңдҝӮзӮәдҪ•пјҹ",opts:["HвҒә жҝғеәҰ > OHвҒ» жҝғеәҰ","HвҒә жҝғеәҰ < OHвҒ» жҝғеәҰ","HвҒә жҝғеәҰ = OHвҒ» жҝғеәҰ","зҙ”ж°ҙдёӯжІ’жңүHвҒәжҲ–OHвҒ»"],ans:2,explain:"pH = 7 д»ЈиЎЁдёӯжҖ§пјҢжӯӨжҷӮжә¶ж¶ІдёӯHвҒәжҝғеәҰзӯүж–јOHвҒ»жҝғеәҰпјҢе…©иҖ…зӣёзӯүпјҢжә¶ж¶Із¶ӯжҢҒйӣ»дёӯжҖ§гҖӮ"},
  {q:"жҹҗйЈІж–ҷзҡ„pHеҖјзӮә2.5пјҢиҲҮpHеҖјзӮә4.5зҡ„йЈІж–ҷзӣёжҜ”пјҢдёӢеҲ—ж•ҳиҝ°дҪ•иҖ…жӯЈзўәпјҹ",opts:["pH=2.5зҡ„йЈІж–ҷй…ёжҖ§ијғејұ","pH=4.5зҡ„йЈІж–ҷHвҒәжҝғеәҰијғеӨ§","pH=2.5зҡ„йЈІж–ҷй…ёжҖ§ијғеј·","е…©иҖ…й…ёжҖ§зӣёеҗҢ"],ans:2,explain:"pHеҖји¶Ҡе°ҸпјҢй…ёжҖ§и¶Ҡеј·пјҢHвҒәжҝғеәҰи¶ҠеӨ§гҖӮpH = 2.5 < 4.5пјҢеӣ жӯӨpH=2.5зҡ„йЈІж–ҷй…ёжҖ§ијғеј·пјҢHвҒәжҝғеәҰијғеӨ§гҖӮ"},
  {q:"зҹіи•Ҡи©ҰзҙҷиҲҮе»Јз”Ёи©Ұзҙҷзҡ„дё»иҰҒе·®з•°зӮәдҪ•пјҹ",opts:["зҹіи•Ҡи©ҰзҙҷеҸӘиғҪжё¬й№јжҖ§","е»Јз”Ёи©ҰзҙҷеҸӘжңүе…©зЁ®йЎҸиүІ","зҹіи•Ҡи©ҰзҙҷеҸӘиғҪеҲӨж–·й…ёй№јжҖ§пјҢе»Јз”Ёи©ҰзҙҷеҸҜдј°жё¬pHеҖј","е…©иҖ…еҠҹиғҪе®Ңе…ЁзӣёеҗҢ"],ans:2,explain:"зҹіи•Ҡи©ҰзҙҷеҸӘиғҪеҲӨж–·жә¶ж¶ІжҳҜй…ёжҖ§пјҲи®Ҡзҙ…пјүжҲ–й№јжҖ§пјҲи®Ҡи—ҚпјүпјҢе»Јз”Ёи©ҰзҙҷеүҮиғҪж №ж“ҡйЎҸиүІи®ҠеҢ–дј°жё¬pHеҖјзҡ„еӨ§е°ҸгҖӮ"},
];
let cur=0,score=0,answered=false;

function startQuiz(){cur=0;score=0;answered=false;document.getElementById('result').style.display='none';document.getElementById('quiz-area').style.display='block';renderQ();}

function renderQ(){
  answered=false;
  document.getElementById('cur').textContent=cur+1;
  const q=questions[cur];
  document.getElementById('quiz-area').innerHTML=`
    <div class="card">
      <div class="question">${cur+1}. ${q.q}</div>
      <div class="options">${q.opts.map((o,i)=>`<button class="opt" onclick="choose(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
      <div class="feedback" id="fb"></div>
      <button class="next-btn" id="nb" onclick="nextQ()">${cur===questions.length-1?'жҹҘзңӢзөҗжһң':'дёӢдёҖйЎҢ вҶ’'}</button>
    </div>`;
}

function choose(i){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const opts=document.querySelectorAll('.opt');
  opts[i].classList.add(i===q.ans?'correct':'wrong');
  if(i!==q.ans)opts[q.ans].classList.add('correct');
  opts.forEach(o=>o.style.pointerEvents='none');
  if(i===q.ans)score++;
  document.getElementById('score').textContent=score;
  const fb=document.getElementById('fb');
  fb.className='feedback show '+(i===q.ans?'ok':'ng');
  fb.innerHTML=(i===q.ans?'вң… зӯ”е°ҚдәҶпјҒ':'вқҢ зӯ”йҢҜдәҶпјҒжӯЈзўәзӯ”жЎҲжҳҜ '+String.fromCharCode(65+q.ans)+'. '+q.opts[q.ans])+'<br><br>рҹ“– '+q.explain;
  document.getElementById('nb').style.display='block';
}

function nextQ(){
  cur++;
  if(cur>=questions.length){document.getElementById('quiz-area').style.display='none';document.getElementById('result').style.display='block';document.getElementById('final').textContent=score;}
  else renderQ();
}

document.getElementById('total').textContent=questions.length;
startQuiz();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
