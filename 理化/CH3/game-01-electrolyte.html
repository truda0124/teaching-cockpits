<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點1：電解質與非電解質</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:20px;}
.container{max-width:560px;margin:0 auto;}
h1{color:var(--Y);font-size:1.3rem;text-align:center;margin-bottom:4px;}
.subtitle{color:var(--faint);font-size:.8rem;text-align:center;margin-bottom:20px;}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:var(--dim);border-radius:8px;padding:10px 16px;margin-bottom:16px;}
.score{color:var(--G);font-weight:700;font-size:1.1rem;}
.progress{color:var(--faint);font-size:.85rem;}
.card{background:var(--board);border-radius:12px;padding:20px;margin-bottom:14px;}
.question{font-size:1rem;line-height:1.6;margin-bottom:16px;color:var(--chalk);}
.options{display:grid;gap:10px;}
.opt{background:var(--dim);border:2px solid transparent;border-radius:8px;padding:12px 16px;cursor:pointer;font-size:.9rem;transition:all .2s;text-align:left;color:var(--chalk);}
.opt:hover{border-color:var(--B);}
.opt.correct{border-color:var(--G);background:#1a3d20;}
.opt.wrong{border-color:var(--R);background:#3d1a1a;}
.feedback{margin-top:14px;padding:12px;border-radius:8px;font-size:.88rem;line-height:1.5;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#1a3d20;border-left:4px solid var(--G);}
.feedback.ng{background:#3d1a1a;border-left:4px solid var(--R);}
.next-btn{display:block;width:100%;margin-top:14px;padding:12px;background:var(--B);color:#0a1a2a;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;display:none;}
.result{text-align:center;padding:30px 20px;}
.result h2{color:var(--Y);font-size:1.5rem;margin-bottom:12px;}
.result .final-score{font-size:2.5rem;color:var(--G);font-weight:900;margin:16px 0;}
.replay-btn{padding:12px 32px;background:var(--Y);color:#1a1a00;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:12px;}
.qr-section{text-align:center;margin-top:20px;padding:16px;background:var(--dim);border-radius:8px;}
.qr-section p{color:var(--faint);font-size:.75rem;margin-top:8px;}
</style>
</head>
<body>
<div class="container">
  <h1>⚡ 重點1：電解質與非電解質</h1>
  <p class="subtitle">國中理化 第3章 酸、鹼、鹽｜形成性評量</p>
  <div class="score-bar">
    <span class="score">得分：<span id="score">0</span></span>
    <span class="progress"><span id="cur">1</span> / <span id="total">6</span></span>
  </div>
  <div id="quiz-area"></div>
  <div id="result" class="result" style="display:none">
    <h2>🎉 測驗完成！</h2>
    <div class="final-score"><span id="final">0</span> / 6</div>
    <p style="color:var(--faint)">電解質與非電解質概念掌握度</p>
    <button class="replay-btn" onclick="startQuiz()">🔄 再玩一次</button>
  </div>
  <div class="qr-section">
    <img id="qr-img" src="" width="100" height="100" alt="QR Code">
    <p>掃描 QR Code 分享此遊戲</p>
  </div>
</div>
<script>
const questions=[
  {q:"下列哪種物質的水溶液可以導電？",opts:["蔗糖","酒精","氯化鈉","蒸餾水"],ans:2,explain:"氯化鈉（NaCl）是電解質，溶於水後解離出Na⁺和Cl⁻，能夠導電。蔗糖、酒精為非電解質，蒸餾水幾乎不導電。"},
  {q:"下列哪種物質屬於「非電解質」？",opts:["鹽酸","氫氧化鈉","醋酸","蔗糖"],ans:3,explain:"非電解質是指水溶液不能導電的化合物。蔗糖溶於水後不會解離，無法導電，故為非電解質。"},
  {q:"電解質水溶液能夠導電的原因是什麼？",opts:["含有金屬元素","溶液中有自由移動的離子","溶液中有自由電子","溶液顏色透明"],ans:1,explain:"電解質溶於水會解離出陽離子和陰離子，離子在溶液中自由移動，使溶液能夠導電。"},
  {q:"下列何者屬於電解質？（可能為酸、鹼或鹽）",opts:["葡萄糖","乙醇（酒精）","碳酸氫鈉（小蘇打）","蒸餾水"],ans:2,explain:"碳酸氫鈉（NaHCO₃）屬於鹽類，是電解質，溶於水後可解離出Na⁺和HCO₃⁻而導電。"},
  {q:"將氯化鈉固體放入導電測試裝置中，燈泡會發亮嗎？",opts:["會，因為氯化鈉含有鈉元素","不會，因為固體中的離子無法自由移動","會，因為氯化鈉是電解質","不會，因為氯化鈉是非電解質"],ans:1,explain:"氯化鈉雖為電解質，但固體狀態下離子被固定在晶格中，無法自由移動，因此不能導電。溶於水後才能導電。"},
  {q:"下列哪個選項正確描述了電解質？",opts:["所有能導電的物質都是電解質","電解質一定是酸性物質","電解質包含酸、鹼、鹽三大類","電解質溶於水不會發生任何變化"],ans:2,explain:"電解質包含酸（如鹽酸）、鹼（如氫氧化鈉）、鹽（如氯化鈉）三大類，它們的水溶液都能導電。"}
];
let cur=0,score=0,answered=false;

function startQuiz(){cur=0;score=0;answered=false;document.getElementById('result').style.display='none';document.getElementById('quiz-area').style.display='block';renderQ();}

function renderQ(){
  answered=false;
  document.getElementById('cur').textContent=cur+1;
  const q=questions[cur];
  document.getElementById('quiz-area').innerHTML=`
    <div class="card">
      <div class="question">${cur+1}. ${q.q}</div>
      <div class="options">${q.opts.map((o,i)=>`<button class="opt" onclick="choose(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
      <div class="feedback" id="fb"></div>
      <button class="next-btn" id="nb" onclick="nextQ()">${cur===questions.length-1?'查看結果':'下一題 →'}</button>
    </div>`;
}

function choose(i){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const opts=document.querySelectorAll('.opt');
  opts[i].classList.add(i===q.ans?'correct':'wrong');
  if(i!==q.ans)opts[q.ans].classList.add('correct');
  opts.forEach(o=>o.style.pointerEvents='none');
  const fb=document.getElementById('fb');
  fb.className='feedback show '+(i===q.ans?'ok':'ng');
  fb.innerHTML=(i===q.ans?'✅ 答對了！':'❌ 答錯了！正確答案是 '+String.fromCharCode(65+q.ans)+'. '+q.opts[q.ans]+'<br>')+'<br>📖 '+q.explain;
  if(i===q.ans)score++;
  document.getElementById('score').textContent=score;
  document.getElementById('nb').style.display='block';
}

function nextQ(){
  cur++;
  if(cur>=questions.length){document.getElementById('quiz-area').style.display='none';document.getElementById('result').style.display='block';document.getElementById('final').textContent=score;}
  else renderQ();
}

document.getElementById('total').textContent=questions.length;
startQuiz();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
