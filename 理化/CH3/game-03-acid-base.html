<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點3：酸與鹼的性質</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:20px;}
.container{max-width:560px;margin:0 auto;}
h1{color:var(--Y);font-size:1.3rem;text-align:center;margin-bottom:4px;}
.subtitle{color:var(--faint);font-size:.8rem;text-align:center;margin-bottom:20px;}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:var(--dim);border-radius:8px;padding:10px 16px;margin-bottom:16px;}
.score{color:var(--G);font-weight:700;font-size:1.1rem;}
.progress{color:var(--faint);font-size:.85rem;}
.card{background:var(--board);border-radius:12px;padding:20px;margin-bottom:14px;}
.question{font-size:1rem;line-height:1.6;margin-bottom:16px;}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.tf-btn{padding:14px;border:2px solid transparent;border-radius:10px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s;}
.tf-btn.true-btn{background:#1a2f3a;color:var(--B);border-color:var(--B);}
.tf-btn.false-btn{background:#3a1a1a;color:var(--R);border-color:var(--R);}
.tf-btn:hover{opacity:.85;}
.tf-btn.correct{background:#1a3d20;border-color:var(--G);color:var(--G);}
.tf-btn.wrong{background:#3d1a1a;border-color:var(--R);color:var(--R);}
.feedback{margin-top:14px;padding:12px;border-radius:8px;font-size:.88rem;line-height:1.5;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#1a3d20;border-left:4px solid var(--G);}
.feedback.ng{background:#3d1a1a;border-left:4px solid var(--R);}
.next-btn{display:none;width:100%;margin-top:14px;padding:12px;background:var(--B);color:#0a1a2a;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
.result{text-align:center;padding:30px 20px;}
.result h2{color:var(--Y);font-size:1.5rem;margin-bottom:12px;}
.final-score{font-size:2.5rem;color:var(--G);font-weight:900;margin:16px 0;}
.replay-btn{padding:12px 32px;background:var(--Y);color:#1a1a00;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
.qr-section{text-align:center;margin-top:20px;padding:16px;background:var(--dim);border-radius:8px;}
.qr-section p{color:var(--faint);font-size:.75rem;margin-top:8px;}
</style>
</head>
<body>
<div class="container">
  <h1>🧪 重點3：酸與鹼的性質</h1>
  <p class="subtitle">國中理化 第3章 酸、鹼、鹽｜是非題</p>
  <div class="score-bar">
    <span class="score">得分：<span id="score">0</span></span>
    <span class="progress"><span id="cur">1</span> / <span id="total">6</span></span>
  </div>
  <div id="quiz-area"></div>
  <div id="result" class="result" style="display:none">
    <h2>🎉 測驗完成！</h2>
    <div class="final-score"><span id="final">0</span> / 6</div>
    <p style="color:var(--faint)">酸鹼性質掌握度</p>
    <button class="replay-btn" onclick="startQuiz()">🔄 再玩一次</button>
  </div>
  <div class="qr-section">
    <img id="qr-img" src="" width="100" height="100" alt="QR Code">
    <p>掃描 QR Code 分享此遊戲</p>
  </div>
</div>
<script>
const questions=[
  {q:"酸性溶液能使藍色石蕊試紙變紅。",ans:true,explain:"正確！酸性溶液中含有較多的H⁺，能使藍色石蕊試紙變紅，這是鑑別酸性溶液的方法之一。"},
  {q:"酸性溶液能與大理石反應，產生的氣體可使帶有火焰的線香熄滅，因此是氫氣。",ans:false,explain:"錯誤！酸與大理石（碳酸鈣）反應產生的是二氧化碳（CO₂），不是氫氣。CO₂不助燃，所以會使線香熄滅。"},
  {q:"鹼性溶液摸起來有滑膩感，是因為鹼會使皮膚上的油脂發生皂化反應。",ans:true,explain:"正確！鹼能與皮膚上的油脂反應（皂化），使皮膚表面變得滑膩，這也是肥皂的製作原理。"},
  {q:"酸性溶液能與鎂帶反應，產生可燃性氣體，該氣體為氫氣（H₂）。",ans:true,explain:"正確！酸與金屬（如鎂）反應會產生氫氣，氫氣具可燃性，帶有火焰的線香靠近時會聽到爆鳴聲。"},
  {q:"鹼性溶液能使紅色石蕊試紙變藍，也能使酚酞指示劑變紅色。",ans:false,explain:"錯誤！鹼性溶液能使紅色石蕊試紙變藍是正確的，但酚酞在鹼性環境下會變成桃紅色（粉紅色），不是紅色。"},
  {q:"醋酸（CH₃COOH）是日常生活中常見的酸性物質，存在於醋中。",ans:true,explain:"正確！醋中含有醋酸（乙酸），是常見的弱酸，也是電解質，水溶液呈酸性。"},
];
let cur=0,score=0,answered=false;

function startQuiz(){cur=0;score=0;answered=false;document.getElementById('result').style.display='none';document.getElementById('quiz-area').style.display='block';renderQ();}

function renderQ(){
  answered=false;
  document.getElementById('cur').textContent=cur+1;
  const q=questions[cur];
  document.getElementById('quiz-area').innerHTML=`
    <div class="card">
      <div class="question">${cur+1}. ${q.q}</div>
      <div class="tf-row">
        <button class="tf-btn true-btn" onclick="choose(true)">⭕ 正確</button>
        <button class="tf-btn false-btn" onclick="choose(false)">❌ 錯誤</button>
      </div>
      <div class="feedback" id="fb"></div>
      <button class="next-btn" id="nb" onclick="nextQ()">${cur===questions.length-1?'查看結果':'下一題 →'}</button>
    </div>`;
}

function choose(val){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const correct=val===q.ans;
  const btns=document.querySelectorAll('.tf-btn');
  btns[0].classList.add(q.ans===true?'correct':'wrong');
  btns[1].classList.add(q.ans===false?'correct':'wrong');
  btns.forEach(b=>b.style.pointerEvents='none');
  if(correct)score++;
  document.getElementById('score').textContent=score;
  const fb=document.getElementById('fb');
  fb.className='feedback show '+(correct?'ok':'ng');
  fb.innerHTML=(correct?'✅ 答對了！':'❌ 答錯了！正確答案是：'+(q.ans?'⭕ 正確':'❌ 錯誤'))+'<br><br>📖 '+q.explain;
  document.getElementById('nb').style.display='block';
}

function nextQ(){
  cur++;
  if(cur>=questions.length){document.getElementById('quiz-area').style.display='none';document.getElementById('result').style.display='block';document.getElementById('final').textContent=score;}
  else renderQ();
}

document.getElementById('total').textContent=questions.length;
startQuiz();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
