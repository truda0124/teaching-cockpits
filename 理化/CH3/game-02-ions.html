<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點2：解離與離子</title>
<style>
:root{--bg:#162b18;--board:#1d3a1f;--dim:#0e1e10;--chalk:#f0ece2;--faint:#9aaa9c;--Y:#f5d050;--B:#5bb3e0;--G:#5dcc78;--R:#e05b5b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--chalk);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:20px;}
.container{max-width:560px;margin:0 auto;}
h1{color:var(--Y);font-size:1.3rem;text-align:center;margin-bottom:4px;}
.subtitle{color:var(--faint);font-size:.8rem;text-align:center;margin-bottom:20px;}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:var(--dim);border-radius:8px;padding:10px 16px;margin-bottom:16px;}
.score{color:var(--G);font-weight:700;font-size:1.1rem;}
.progress{color:var(--faint);font-size:.85rem;}
.card{background:var(--board);border-radius:12px;padding:20px;margin-bottom:14px;}
.question{font-size:1rem;line-height:1.6;margin-bottom:16px;}
/* 配對題 */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.match-col h3{color:var(--Y);font-size:.8rem;margin-bottom:8px;text-align:center;}
.match-item{background:var(--dim);border:2px solid transparent;border-radius:8px;padding:10px;cursor:pointer;font-size:.9rem;text-align:center;transition:all .2s;margin-bottom:8px;}
.match-item.selected{border-color:var(--Y);background:#2a2a00;}
.match-item.matched{border-color:var(--G);background:#1a3d20;cursor:default;}
.match-item.wrong-flash{border-color:var(--R);background:#3d1a1a;}
.feedback{margin-top:14px;padding:12px;border-radius:8px;font-size:.88rem;line-height:1.5;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#1a3d20;border-left:4px solid var(--G);}
.feedback.ng{background:#3d1a1a;border-left:4px solid var(--R);}
.result{text-align:center;padding:30px 20px;}
.result h2{color:var(--Y);font-size:1.5rem;margin-bottom:12px;}
.result .final-score{font-size:2.5rem;color:var(--G);font-weight:900;margin:16px 0;}
.replay-btn{padding:12px 32px;background:var(--Y);color:#1a1a00;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:12px;}
.next-btn{display:none;width:100%;margin-top:14px;padding:12px;background:var(--B);color:#0a1a2a;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
.qr-section{text-align:center;margin-top:20px;padding:16px;background:var(--dim);border-radius:8px;}
.qr-section p{color:var(--faint);font-size:.75rem;margin-top:8px;}
</style>
</head>
<body>
<div class="container">
  <h1>🔬 重點2：解離與離子</h1>
  <p class="subtitle">國中理化 第3章 酸、鹼、鹽｜配對遊戲</p>
  <div class="score-bar">
    <span class="score">配對成功：<span id="score">0</span></span>
    <span class="progress"><span id="matched">0</span> / <span id="total">5</span> 組</span>
  </div>
  <div id="quiz-area"></div>
  <div id="result" class="result" style="display:none">
    <h2>🎉 全部配對完成！</h2>
    <div class="final-score">5 / 5</div>
    <p style="color:var(--faint)">離子符號與名稱對應</p>
    <button class="replay-btn" onclick="startGame()">🔄 再玩一次</button>
  </div>
  <div class="qr-section">
    <img id="qr-img" src="" width="100" height="100" alt="QR Code">
    <p>掃描 QR Code 分享此遊戲</p>
  </div>
</div>
<script>
const pairs=[
  {left:'Na⁺',right:'鈉離子（陽離子）'},
  {left:'Cl⁻',right:'氯離子（陰離子）'},
  {left:'Ca²⁺',right:'鈣離子（陽離子）'},
  {left:'OH⁻',right:'氫氧根離子（陰離子）'},
  {left:'SO₄²⁻',right:'硫酸根離子（陰離子）'},
];
let sel={left:null,right:null},matched=0,errors=0;

function shuffle(arr){return arr.slice().sort(()=>Math.random()-.5);}

function startGame(){
  matched=0;errors=0;sel={left:null,right:null};
  document.getElementById('result').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  document.getElementById('matched').textContent=0;
  document.getElementById('score').textContent=0;

  const lefts=shuffle(pairs.map(p=>p.left));
  const rights=shuffle(pairs.map(p=>p.right));

  document.getElementById('quiz-area').innerHTML=`
    <div class="card">
      <div class="question">🔗 將左側離子符號與右側名稱正確配對</div>
      <div class="match-wrap">
        <div>
          <h3>離子符號</h3>
          ${lefts.map(l=>`<div class="match-item" id="L-${l}" onclick="pick('left','${l}')">${l}</div>`).join('')}
        </div>
        <div>
          <h3>離子名稱</h3>
          ${rights.map(r=>`<div class="match-item" id="R-${encodeURIComponent(r)}" onclick="pick('right','${encodeURIComponent(r)}')">${r}</div>`).join('')}
        </div>
      </div>
      <div class="feedback" id="fb"></div>
    </div>`;
}

function pick(side,val){
  const id=(side==='left'?'L-':'R-')+val;
  const el=document.getElementById(id);
  if(el.classList.contains('matched'))return;

  if(sel[side]){
    document.getElementById((side==='left'?'L-':'R-')+sel[side]).classList.remove('selected');
  }
  sel[side]=val;
  el.classList.add('selected');

  if(sel.left&&sel.right){
    const lv=sel.left;
    const rv=decodeURIComponent(sel.right);
    const pair=pairs.find(p=>p.left===lv);
    if(pair&&pair.right===rv){
      // correct
      document.getElementById('L-'+lv).classList.replace('selected','matched');
      document.getElementById('R-'+sel.right).classList.replace('selected','matched');
      matched++;
      document.getElementById('matched').textContent=matched;
      document.getElementById('score').textContent=matched;
      if(matched===pairs.length){setTimeout(()=>{document.getElementById('quiz-area').style.display='none';document.getElementById('result').style.display='block';},600);}
    } else {
      // wrong flash
      errors++;
      const lEl=document.getElementById('L-'+lv);
      const rEl=document.getElementById('R-'+sel.right);
      lEl.classList.add('wrong-flash');rEl.classList.add('wrong-flash');
      setTimeout(()=>{lEl.classList.remove('wrong-flash','selected');rEl.classList.remove('wrong-flash','selected');},600);
    }
    sel={left:null,right:null};
  }
}

startGame();
document.getElementById('total').textContent=pairs.length;
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
